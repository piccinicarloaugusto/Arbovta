/* ══════════════════════════════════════════
   IMPORTATORE GEOJSON (da conversione Ginve/QField)
══════════════════════════════════════════ */
function importGeoJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const gj = JSON.parse(ev.target.result);
      if (gj.type !== 'FeatureCollection' || !gj.features?.length) {
        showGinveFeedback('File GeoJSON non valido o vuoto.', false); return;
      }
      const cpcMap = {'CLASSE A':'A','CLASSE B':'B','CLASSE C':'C','CLASSE D':'D','A':'A','B':'B','C':'C','D':'D'};
      const rischioMap = {'A':'Trascurabile','B':'Basso','C':'Moderato','D':'Elevato'};

      ginveParsed = gj.features.map(f => {
        const p = f.properties || {};
        const [lng, lat] = f.geometry?.coordinates || [0, 0];
        const cpc = cpcMap[p.cpc] || cpcMap[(p.cpc||'').toUpperCase()] || 'A';
        return {
          id:             String(p.codice || p.id || p.IDENTIF || ''),
          specie:         p.specie || p.SPECIE || p.species || '—',
          sito:           p.sito || p.ubicazione || p.TOPONIMO || '—',
          ubicazione:     p.ubicazione || p.sito || '',
          data:           String(p.data || p.DATA_INIZIO || p.date || '').substring(0,10),
          cpc,
          rischio:        rischioMap[cpc] || 'Trascurabile',
          indiceRischio:  p.indiceRischio || null,
          lat:            lat ? +lat.toFixed(6) : 0,
          lng:            lng ? +lng.toFixed(6) : 0,
          h:              p.altezza_m || p.h || p.AL_ALTPI || null,
          dbh:            p.dbh_cm || p.dbh || p.AL_FUSDM || null,
          cw:             p.chioma_l_m || p.cw || p.AL_CHIDM || null,
          cd:             p.chioma_p_m || p.cd || p.AL_CHIDP || null,
          hPalco:         p.hPalco || null,
          disposizione:   p.disposizione || '',
          stazione:       p.stazione || '',
          suolo:          p.suolo || '',
          pavimentazione: p.pavimentazione || '',
          sitoCon:        p.sitoCon || '',
          posizSoc:       p.posizSoc || '',
          conflitti:      p.conflitti || '',
          fattoreContatto:    p.fattoreContatto || '',
          fattoreDanno:       p.fattoreDanno || '',
          fattoreContattoNum: p.fattoreContattoNum || null,
          fattoreDimensionale:p.fattoreDimensionale || null,
          indiceRischio:      p.indiceRischio || null,
          giudVeg:        p.giudVeg || p.stato_vegetativo || '',
          giudFisio:      p.giudFisio || '',
          giudBiomec:     p.giudBiomec || p.giudizio_biomeccanico || '',
          prescrizioni:   p.prescrizioni || '',
          note:           p.note || '',
          /* Dati VTA completi (presenti nel GeoJSON generato da Excel) */
          vta:            p.vta || {},
          _fromGinve:     true,
          _editedByUser:  !!p._editedByUser,
          _hasGPS:        !!(lat && lng),
          _source:        p._source || 'geojson'
        };
      }).filter(t => t.id);

      if (!ginveParsed.length) {
        showGinveFeedback('Nessuna pianta trovata nel GeoJSON.', false); return;
      }
      showGinvePreview(ginveParsed);
      document.getElementById('ginve-feedback').style.display = 'none';
    } catch(err) {
      showGinveFeedback('Errore nella lettura del GeoJSON: ' + err.message, false);
    }
  };
  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
}

/* ══════════════════════════════════════════
   IMPORTATORE GEOPACKAGE (QField/Ginve)
══════════════════════════════════════════ */
async function importGpkg(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  showGinveFeedback('Lettura GeoPackage in corso...', true);

  try {
    /* Leggi file come ArrayBuffer */
    const buf = await file.arrayBuffer();
    const bytes = new Uint8Array(buf);

    /* Verifica magic SQLite */
    const magic = String.fromCharCode(...bytes.slice(0, 16));
    if (!magic.startsWith('SQLite format 3')) {
      showGinveFeedback('File non valido — assicurati di caricare un file .gpkg esportato da QField.', false);
      return;
    }

    /* Usa sql.js per leggere il database SQLite in-browser */
    await ensureSqlJs();
    const SQL = window._sqlJs;
    const db = new SQL.Database(bytes);

    /* Lookup tables */
    const essenze = buildLookup(db, 'ALB_ESSENZE', 'id', 'DESCRIZIONE');
    const cpcLookup = buildLookup(db, 'AL_CLVTA', 'id', 'AL_VTADS');
    const svLookup = buildLookup(db, 'AL_STVEG', 'id', 'AL_SVEDS');
    const giuLookup = buildLookup(db, 'AL_GIUDI', 'id', 'AL_GIUDS');
    const ubiLookup = buildLookupMulti(db, 'UBICAZIONI', 'id', ['TOPONIMO','RIFCARTOGRAFICO']);
    const dispoLookup = buildLookup(db, 'AL_DISPO', 'id', 'AL_DISDS');

    /* Query principale */
    const res = db.exec(`
      SELECT IDENTIF, ID_ESSEN, AL_VTAID, AL_SVEID, AL_GIUID,
             AL_ALTPI, AL_FUSDM, AL_CHIDM, AL_CHIDP, DATA_INIZIO,
             SHAPE, ID_UBICAZIONE, AL_NOTGE, AL_DISID
      FROM ALBERI
    `);

    if (!res.length || !res[0].values.length) {
      showGinveFeedback('Nessuna pianta trovata nel GeoPackage.', false);
      return;
    }

    const cpcMap = {'CLASSE A':'A','CLASSE B':'B','CLASSE C':'C','CLASSE D':'D','CLASSE C/D':'C'};
    const rischioMap = {'A':'Trascurabile','B':'Basso','C':'Moderato','D':'Elevato'};

    ginveParsed = res[0].values.map(r => {
      const [identif, idEss, idVta, idSv, idGiu, altpi, fusdm, chidm, chidp,
             dataInizio, shape, idUbi, notge, idDispo] = r;

      /* Parse geometria GPKG → WGS84 */
      let lat = 0, lng = 0;
      if (shape) {
        const [x, y] = parseGpkgPoint(shape);
        if (x && y) [lat, lng] = gaussBoagaToWgs84(x, y);
      }

      const cpcRaw = cpcLookup[idVta] || '';
      const cpc = cpcMap[cpcRaw] || 'A';
      const ubi = ubiLookup[idUbi] || {};
      const ubicazione = [ubi.TOPONIMO, ubi.RIFCARTOGRAFICO].filter(Boolean).join(' — ');

      return {
        id: String(identif),
        specie: toTitleCase(essenze[idEss] || ''),
        sito: ubicazione,
        data: String(dataInizio || '').substring(0, 10),
        cpc, rischio: rischioMap[cpc] || 'Trascurabile',
        lat: lat ? +lat.toFixed(6) : 0,
        lng: lng ? +lng.toFixed(6) : 0,
        h: altpi ? +altpi : null,
        dbh: fusdm ? +fusdm : null,
        cw: chidm ? +chidm : null,
        cd: chidp ? +chidp : null,
        giudVeg: svLookup[idSv] || '',
        giudBiomec: giuLookup[idGiu] || '',
        disposizione: dispoLookup[idDispo] || '',
        note: notge || '',
        _fromGinve: true, _hasGPS: !!(lat && lng)
      };
    });

    db.close();
    showGinvePreview(ginveParsed);
    document.getElementById('ginve-feedback').style.display = 'none';

  } catch(err) {
    console.error(err);
    showGinveFeedback('Errore nella lettura del GeoPackage: ' + err.message, false);
  }
}

/* ── sql.js loader (SQLite in WebAssembly) ── */
function ensureSqlJs() {
  if (window._sqlJs) return Promise.resolve();
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js';
    s.onload = () => {
      initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` })
        .then(SQL => { window._sqlJs = SQL; resolve(); })
        .catch(reject);
    };
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

/* ── Helpers lookup ── */
function buildLookup(db, table, keyCol, valCol) {
  const map = {};
  try {
    const res = db.exec(`SELECT ${keyCol}, ${valCol} FROM ${table}`);
    if (res.length) res[0].values.forEach(r => { map[r[0]] = r[1]; });
  } catch(e) {}
  return map;
}
function buildLookupMulti(db, table, keyCol, valCols) {
  const map = {};
  try {
    const res = db.exec(`SELECT ${keyCol}, ${valCols.join(',')} FROM ${table}`);
    if (res.length) res[0].values.forEach(r => {
      const obj = {};
      valCols.forEach((c, i) => { obj[c] = r[i+1]; });
      map[r[0]] = obj;
    });
  } catch(e) {}
  return map;
}

/* ── Geometry parsing ── */
function parseGpkgPoint(blob) {
  const data = blob instanceof Uint8Array ? blob : new Uint8Array(blob);
  const flags = data[3];
  const envType = (flags >> 1) & 0x07;
  const envSizes = [0, 32, 48, 48, 64];
  const envSize = envSizes[Math.min(envType, 4)];
  const wkb = data.slice(8 + envSize);
  const le = wkb[0] === 1;
  const view = new DataView(wkb.buffer, wkb.byteOffset);
  const geomType = view.getUint32(1, le);
  if (geomType === 1) {
    const x = view.getFloat64(5, le);
    const y = view.getFloat64(13, le);
    return [x, y];
  }
  return [null, null];
}

/* ── Gauss-Boaga Ovest (EPSG:3003) → WGS84 ── */
function gaussBoagaToWgs84(x, y) {
  const a=6378388,f=1/297,b=a*(1-f),e2=1-(b/a)**2;
  const k0=0.9996,lon0=9*Math.PI/180,FE=1500000;
  const x1=x-FE, M=y/k0;
  const mu=M/(a*(1-e2/4-3*e2**2/64-5*e2**3/256));
  const e1=(1-Math.sqrt(1-e2))/(1+Math.sqrt(1-e2));
  const phi1=mu+(3*e1/2-27*e1**3/32)*Math.sin(2*mu)+(21*e1**2/16-55*e1**4/32)*Math.sin(4*mu)+(151*e1**3/96)*Math.sin(6*mu);
  const N1=a/Math.sqrt(1-e2*Math.sin(phi1)**2);
  const T1=Math.tan(phi1)**2,C1=e2/(1-e2)*Math.cos(phi1)**2;
  const R1=a*(1-e2)/(1-e2*Math.sin(phi1)**2)**1.5,D=x1/(N1*k0);
  const lat=phi1-(N1*Math.tan(phi1)/R1)*(D**2/2-(5+3*T1+10*C1-4*C1**2-9*e2/(1-e2))*D**4/24);
  const lon=lon0+(D-(1+2*T1+C1)*D**3/6)/Math.cos(phi1);
  return [lat*180/Math.PI, lon*180/Math.PI];
}

function toTitleCase(s) {
  return s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}
let ginveParsed = [];

function importGinveCSV(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      ginveParsed = parseGinveCSV(ev.target.result);
      showGinvePreview(ginveParsed);
    } catch(err) {
      showGinveFeedback('Errore nella lettura del file. Verifica che sia un CSV esportato da Ginve con separatore punto e virgola.', false);
    }
  };
  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
}

function parseGinveCSV(text) {
  /* Rimuovi BOM se presente */
  text = text.replace(/^\uFEFF/, '');
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) throw new Error('File vuoto');

  /* Intestazioni — separatore ; */
  const headers = lines[0].split(';').map(h => h.trim().replace(/"/g, ''));

  const cpcMap = {
    'CLASSE A':'A','CLASSE B':'B','CLASSE C':'C','CLASSE D':'D',
    'A':'A','B':'B','C':'C','D':'D',
    'classe a':'A','classe b':'B','classe c':'C','classe d':'D'
  };
  const rischioMap = {'A':'Trascurabile','B':'Basso','C':'Moderato','D':'Elevato'};

  function parseAltezza(s) {
    if (!s || s === '-' || s === '0') return null;
    /* "2) 6m = 12m" → 12, oppure numero diretto */
    const match = s.match(/(\d+(?:\.\d+)?)\s*m\s*$/i);
    if (match) return parseFloat(match[1]);
    const nums = s.match(/\d+(?:\.\d+)?/g);
    return nums ? parseFloat(nums[nums.length - 1]) : null;
  }

  function col(row, name) {
    const idx = headers.findIndex(h => h.toLowerCase().includes(name.toLowerCase()));
    return idx >= 0 ? (row[idx] || '').trim().replace(/"/g, '') : '';
  }

  const results = [];
  for (let i = 1; i < lines.length; i++) {
    const row = lines[i].split(';');
    if (row.length < 3) continue;

    const cpcRaw = col(row, 'Classe PC');
    const cpc = cpcMap[cpcRaw] || cpcMap[cpcRaw?.toUpperCase()] || 'A';

    /* Costruisci ubicazione da campi Ginve */
    const via = col(row, 'Via o Piazza');
    const comune = col(row, 'Rif. Cart.');
    const fraz = col(row, 'Circ. o Quart');
    const tipoUbic = col(row, 'Tipol. Ubicazione');
    const toponimo = col(row, 'Toponimo');
    const ubicazione = [tipoUbic, toponimo, via, fraz, comune].filter(Boolean).join(' — ');

    const hRaw = col(row, 'Altezza (m)');
    const dbhRaw = col(row, 'Diametro Fusto');
    const cwRaw = col(row, 'Diametro Chioma');
    const hClasseRaw = col(row, 'Classe Altezza');

    /* Preferisci valore numerico diretto, fallback sulla classe */
    const h = hRaw && hRaw !== '0' ? parseFloat(hRaw) : parseAltezza(hClasseRaw);
    const dbh = dbhRaw && dbhRaw !== '0' ? parseFloat(dbhRaw) : null;
    const cw = cwRaw && cwRaw !== '0' ? parseFloat(cwRaw) : null;

    results.push({
      id: col(row, 'Identificativo'),
      specie: col(row, 'Specie'),
      sito: ubicazione || col(row, 'Tipol. Ubicazione'),
      data: col(row, 'Ult. Cens') || col(row, 'Data Calcolo') || new Date().toISOString().split('T')[0],
      cpc,
      rischio: rischioMap[cpc] || 'Trascurabile',
      lat: 0, lng: 0,   /* Ginve non esporta coordinate in questo formato */
      h, dbh, cw, cd: null,
      disposizione: col(row, 'Disposizione'),
      stazione: col(row, 'Dimora'),
      pavimentazione: col(row, 'Tipo Pavimentazione'),
      portamento: col(row, 'Portamento'),
      giudVeg: col(row, 'Stato Vegetativo'),
      giudBiomec: col(row, 'Giudizio Biomeccanico'),
      pericolosita: col(row, 'Indice di Pericolosità'),
      _fromGinve: true
    });
  }
  return results;
}

function showGinvePreview(items) {
  const preview = document.getElementById('ginve-preview');
  const title = document.getElementById('ginve-preview-title');
  const list = document.getElementById('ginve-preview-list');
  if (!preview || !title || !list) return;

  /* Conta duplicati */
  const existing = new Set(G.trees.map(t => t.id));
  const dupes = items.filter(t => existing.has(t.id)).length;
  const nuovi = items.length - dupes;

  title.textContent = `${items.length} piante trovate — ${nuovi} nuove, ${dupes} già presenti (verranno aggiornate)`;

  const cpcColors = {A:'var(--green-700)',B:'var(--amber-dark)',C:'#4A1B0C',D:'var(--red-dark)'};
  const cpcBg = {A:'var(--green-100)',B:'var(--amber-light)',C:'var(--coral-light)',D:'var(--red-light)'};

  list.innerHTML = items.map(t => `
    <div style="display:flex;align-items:center;gap:7px;padding:6px 8px;background:${existing.has(t.id)?'var(--amber-light)':'var(--surface-2)'};border-radius:var(--r-sm);border:0.5px solid var(--border)">
      <span style="font-size:9px;font-weight:700;padding:2px 5px;border-radius:6px;background:${cpcBg[t.cpc]};color:${cpcColors[t.cpc]};flex-shrink:0">CPC ${t.cpc}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;font-weight:500;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.specie}</div>
        <div style="font-size:10px;color:var(--text-muted);">#${t.id} · H:${t.h||'—'}m · DBH:${t.dbh||'—'}cm · ${t.sito?.substring(0,30)||'—'}</div>
      </div>
      ${t._hasGPS||t.lat?'<span style="font-size:10px;color:var(--green-600);flex-shrink:0" title="Coordinate GPS disponibili">📍</span>':'<span style="font-size:10px;color:var(--text-muted);flex-shrink:0" title="Senza coordinate">—</span>'}
      ${existing.has(t.id)?'<span style="font-size:9px;color:var(--amber-dark);font-weight:600;flex-shrink:0">AGG.</span>':''}
    </div>`).join('');

  preview.style.display = 'block';
  document.getElementById('ginve-feedback').style.display = 'none';
}

function confirmGinveImport() {
  if (!ginveParsed.length) return;
  const existing = new Map(G.trees.map(t => [t.id, t]));
  let added = 0, updated = 0;

  ginveParsed.forEach(t => {
    if (existing.has(t.id)) {
      const old = existing.get(t.id);
      const idx = G.trees.findIndex(x => x.id === t.id);
      G.trees[idx] = { ...t, lat: t.lat || old.lat, lng: t.lng || old.lng };
      updated++;
    } else {
      G.trees.push(t);
      added++;
    }
  });

  const withGPS = ginveParsed.filter(t => t._hasGPS || (t.lat && t.lng)).length;
  saveTrees();
  ginveParsed = [];
  document.getElementById('ginve-preview').style.display = 'none';

  const gpsMsg = withGPS > 0
    ? `${withGPS} piante con coordinate GPS — visibili sulla mappa.`
    : `Nessuna coordinata GPS — aggiungile in campo.`;
  showGinveFeedback(`✓ ${added} piante aggiunte, ${updated} aggiornate.\n${gpsMsg}`, true);

  /* Ricarica archivio e mappa con i nuovi dati */
  setTimeout(() => {
    if (G.currentView === 'lista') render('lista');
    if (G.currentView === 'mappa') {
      render('mappa');
      ensureLeaflet(() => setTimeout(initLeafletMap, 200));
    }
  }, 400);
}

function cancelGinveImport() {
  ginveParsed = [];
  document.getElementById('ginve-preview').style.display = 'none';
}

function showGinveFeedback(msg, ok) {
  const el = document.getElementById('ginve-feedback');
  if (!el) return;
  el.style.display = 'block';
  el.style.background = ok ? 'var(--green-100)' : 'var(--amber-light)';
  el.style.color = ok ? 'var(--green-700)' : 'var(--amber-dark)';
  el.style.borderColor = ok ? 'var(--green-300)' : 'var(--amber)';
  el.style.border = '0.5px solid';
  el.textContent = msg;
}

function saveTrees() {
  try { localStorage.setItem('arbovta-trees', JSON.stringify(G.trees)); } catch(e) {}

function loadTrees() {
  try {
    const saved = localStorage.getItem('arbovta-trees');
    if (saved) {
      const parsed = JSON.parse(saved);
      /* Filtra le piante demo hardcoded (id 2046/2047/2048) se l'utente non le ha create */
      const demoIds = new Set(['2046','2047','2048']);
      const real = parsed.filter(t => !demoIds.has(t.id) || t._fromGinve || t._editedByUser);
      if (real.length) G.trees = real;
      else if (parsed.length && parsed.every(t => demoIds.has(t.id))) {
        /* Solo demo in cache — le scartiamo, l'archivio parte vuoto */
        localStorage.removeItem('arbovta-trees');
      }
    }
  } catch(e) {}
}
function resetArchivio() {
  if (!confirm('Cancellare tutto l\'archivio? Questa operazione non è reversibile.')) return;
  G.trees = [];
  try { localStorage.removeItem('arbovta-trees'); } catch(e) {}
  render('lista');
  go('impostazioni' in G ? 'lista' : 'lista', document.querySelectorAll('.nav-tab')[0]);
  resetNav();
  showGinveFeedback('Archivio cancellato. Importa il tuo GeoJSON per ricominciare.', true);
}

/* Patch saveRilievo per persistenza */
const _origSave = saveRilievo;
window.saveRilievo = function() {
  _origSave();
  saveTrees();
};

/* Carica dati salvati all'avvio */
loadTrees();

/* ── Indicatore stato rete ── */
function updateOnlineStatus() {
  const isOnline = navigator.onLine;
  let dot = document.getElementById('net-dot');
  if (!dot) {
    dot = document.createElement('div');
    dot.id = 'net-dot';
    dot.style.cssText = 'width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background 0.3s';
    const tr = document.querySelector('.topbar-right');
    if (tr) tr.insertBefore(dot, tr.firstChild);
  }
  dot.style.background = isOnline ? '#6ee87a' : '#E24B4A';
  dot.title = isOnline ? 'Online' : 'Offline — modalità locale attiva';
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
setTimeout(updateOnlineStatus, 500);
</script>
</body>
</html>
