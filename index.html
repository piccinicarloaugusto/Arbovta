<title>ArboRisk — Rilievi Fitosanitari</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

:root{
  --green-900:#0d1f0d;--green-800:#1a3a1a;--green-700:#27500A;--green-600:#3B6D11;
  --green-500:#4a8a18;--green-400:#639922;--green-300:#97C459;--green-200:#C0DD97;
  --green-100:#EAF3DE;--green-50:#f4f9ed;
  --amber:#EF9F27;--amber-dark:#633806;--amber-light:#FAEEDA;
  --red:#E24B4A;--red-dark:#501313;--red-light:#FCEBEB;
  --coral:#D85A30;--coral-light:#FAECE7;
  --blue:#378ADD;--blue-light:#E6F1FB;
  --ink:#1a2010;--ink-2:#2d3d20;
  --surface:#f7faf2;--surface-2:#eef4e4;--surface-3:#e4edce;
  --border:#ccdaa8;--border-2:#b8cc8e;
  --text-primary:#1a2010;--text-secondary:#4a5e30;--text-muted:#7a9050;
  --font-sans:'DM Sans',sans-serif;--font-serif:'Instrument Serif',serif;--font-mono:'DM Mono',monospace;
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;
  --shadow:0 1px 3px rgba(26,46,10,0.08);--shadow-md:0 4px 12px rgba(26,46,10,0.12);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--surface)}
body{font-family:var(--font-sans);font-size:14px;color:var(--text-primary);display:flex;flex-direction:column;min-height:100dvh}

/* ── LAYOUT — responsive tablet ── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;width:100%;background:var(--surface);position:relative}
.topbar{background:var(--green-900);padding:11px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo-wrap{display:flex;align-items:center;gap:9px}
.logo-icon{width:34px;height:34px;border-radius:8px;background:var(--green-800);border:0.5px solid var(--green-700);display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:18px;height:18px;fill:var(--green-300)}
.logo-text .name{font-family:var(--font-serif);font-size:18px;color:#e8f0d8;font-style:italic;letter-spacing:0.01em}
.logo-text .ver{font-size:10px;color:var(--green-400);font-family:var(--font-mono);letter-spacing:0.04em}
.topbar-right{display:flex;gap:7px;align-items:center}
.badge{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:500;letter-spacing:0.04em}
.badge-beta{background:rgba(97,185,34,0.15);color:var(--green-300);border:0.5px solid rgba(97,185,34,0.25)}
.btn-new{font-size:13px;padding:7px 14px;border-radius:var(--r-sm);border:none;background:var(--green-600);color:#e8f0d8;cursor:pointer;font-family:var(--font-sans);font-weight:500}
.btn-new:hover{background:var(--green-500)}
.btn-new:active{transform:scale(0.97)}

/* ── NAV ── */
.nav{background:var(--green-900);border-top:0.5px solid var(--green-800);padding:0 8px;display:flex;flex-shrink:0}
.nav-tab{flex:1;padding:9px 4px 10px;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;color:var(--green-400);background:none;border-left:none;border-right:none;border-top:none;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--font-sans);letter-spacing:0.02em;transition:color 0.15s}
.nav-tab svg{width:18px;height:18px;fill:currentColor;opacity:0.8}
.nav-tab.active{color:var(--green-200);border-bottom-color:var(--green-300)}
.nav-tab.active svg{opacity:1}
.nav-tab:hover:not(.active){color:var(--green-300)}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:14px 16px 8px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── TABLET (≥ 600px) ── */
@media (min-width:600px){
  .content{padding:16px 20px 10px;gap:12px}
  .fg{grid-template-columns:1fr 1fr 1fr}
  .fg3{grid-template-columns:repeat(4,1fr)}
  .mets{grid-template-columns:repeat(4,1fr)}
  .card{padding:16px}
  .nav-tab{font-size:12px;padding:10px 8px 11px}
  .nav-tab svg{width:20px;height:20px}
  .btn-new{font-size:14px;padding:8px 18px}
  .logo-text .name{font-size:20px}
  .tree-item{padding:12px 16px}
  .tree-name{font-size:14px}
  .tree-meta{font-size:11px}
  .cap-btn{padding:16px 16px;font-size:15px}
  .met-v{font-size:24px}
  /* Clinometro tablet — viewfinder più alto */
  .clino-cam-wrap{min-height:60vh}
  .hud-angle{font-size:68px}
  .hud-unit{font-size:22px}
  .crosshair-wrap{width:100px;height:100px}
  .ch-tl,.ch-tr,.ch-bl,.ch-br{width:20px;height:20px}
  /* Mappa tablet */
  #leaflet-map{height:80dvh !important;min-height:450px}
  /* Scheda VTA tablet — 3 colonne */
  .chips{gap:6px}
  .chip{font-size:12px;padding:5px 11px}
  .step-instruction{font-size:13px}
}

/* ── LANDSCAPE (qualsiasi dispositivo) ── */
@media (orientation:landscape) and (max-height:500px){
  .topbar{padding:7px 20px}
  .logo-text .name{font-size:15px}
  .logo-text .ver{display:none}
  .nav-tab{padding:6px 4px 7px;font-size:10px}
  .nav-tab svg{width:16px;height:16px}
  .content{padding:10px 16px 6px;gap:8px}
  .clino-cam-wrap{min-height:calc(100dvh - 160px)}
}

/* ── LANDSCAPE — layout adattivo ── */
@media (orientation:landscape){
  /* Navbar si sposta a sinistra verticalmente */
  body{flex-direction:row}
  .topbar{display:none} /* nasconde topbar in landscape per più spazio */
  .navbar{
    flex-direction:column;
    width:72px;
    min-width:72px;
    height:100dvh;
    border-top:none;
    border-right:0.5px solid var(--border);
    overflow-y:auto;
    padding:8px 0;
    order:-1;
  }
  .nav-tab{
    flex-direction:column;
    padding:10px 4px;
    font-size:9px;
    gap:3px;
    border-top:none;
    border-left:3px solid transparent;
    border-bottom:none;
  }
  .nav-tab.active{
    border-left-color:var(--green-500);
    border-bottom:none;
  }
  .page{
    flex:1;
    height:100dvh;
    overflow-y:auto;
  }
  .content{
    padding:10px 14px;
    max-width:none;
  }
  /* Mappa più alta in landscape */
  #leaflet-map{height:calc(100dvh - 180px) !important}
  .clino-cam-wrap{min-height:calc(100dvh - 180px)}
}

/* ── TABLET LANDSCAPE ── */
@media (min-width:600px) and (orientation:landscape){
  .clino-cam-wrap{min-height:calc(100dvh - 180px)}
  #leaflet-map{height:calc(100dvh - 300px) !important}
}

/* ── BOTTOM BAR ── */
.bottombar{background:var(--surface);border-top:0.5px solid var(--border);padding:10px 14px;display:none;gap:8px;flex-shrink:0}

/* ── CARDS ── */
.card{background:#fff;border:0.5px solid var(--border);border-radius:var(--r-lg);padding:13px;box-shadow:var(--shadow)}
.card-dark{background:var(--green-900);border-color:var(--green-800)}
.sec{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.sec svg{width:12px;height:12px;fill:var(--text-muted);flex-shrink:0}

/* ── FORMS ── */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:0.02em}
.field input,.field select,.field textarea{font-size:13px;border:0.5px solid var(--border);border-radius:var(--r-sm);padding:7px 9px;background:#fff;color:var(--text-primary);width:100%;font-family:var(--font-sans);transition:border-color 0.15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--green-400);box-shadow:0 0 0 2px rgba(97,153,34,0.12)}
.field input[readonly]{background:var(--surface-2);color:var(--text-secondary)}
.field textarea{resize:vertical;min-height:46px;line-height:1.5}

/* ── MULTISELECT CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
.chip{font-size:11px;padding:3px 9px;border:0.5px solid var(--border);border-radius:12px;cursor:pointer;background:#fff;color:var(--text-secondary);transition:all 0.12s;white-space:nowrap}
.chip:hover{border-color:var(--green-400);color:var(--green-700)}
.chip.on{background:var(--green-100);border-color:var(--green-400);color:var(--green-700);font-weight:500}

/* ── SEVERITY ── */
.sev{display:flex;gap:4px}
.sev-b{flex:1;padding:5px 4px;border-radius:var(--r-sm);font-size:11px;text-align:center;cursor:pointer;background:#fff;color:var(--text-muted);border:0.5px solid var(--border);transition:all 0.12s}
.sev-b:hover{border-color:var(--border-2)}
.sev-l.on{background:var(--green-100);border-color:var(--green-400);color:var(--green-700)}
.sev-m.on{background:var(--amber-light);border-color:var(--amber);color:var(--amber-dark)}
.sev-e.on{background:var(--red-light);border-color:var(--red);color:var(--red-dark)}

/* ── GIUDIZIO ── */
.gjd{display:flex;gap:3px}
.gj{flex:1;padding:4px 2px;border-radius:4px;font-size:9px;text-align:center;cursor:pointer;font-weight:500;border:1px solid transparent;transition:all 0.12s;letter-spacing:0.02em}
.gj:hover{filter:brightness(0.92)}
.gj.on{outline:2px solid var(--ink);outline-offset:1px}

/* ── PERICOLOSITÀ ── */
.peric{display:flex;gap:3px}
.per{flex:1;padding:4px 2px;border-radius:4px;font-size:8px;text-align:center;cursor:pointer;border:0.5px solid;transition:all 0.12s;letter-spacing:0.03em;font-weight:600}
.per:hover{filter:brightness(0.9)}
.per.on{outline:2px solid var(--ink);outline-offset:1px}

/* ── BUTTONS ── */
.btn-primary{width:100%;padding:11px;font-size:13px;font-weight:600;border:none;border-radius:var(--r-md);background:var(--green-600);color:#e8f0d8;cursor:pointer;font-family:var(--font-sans);letter-spacing:0.01em;transition:all 0.15s}
.btn-primary:hover{background:var(--green-700)}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:disabled{background:var(--border);color:var(--text-muted);cursor:not-allowed}
.btn-secondary{width:100%;padding:10px;font-size:13px;border:0.5px solid var(--border-2);border-radius:var(--r-md);background:transparent;color:var(--text-primary);cursor:pointer;font-family:var(--font-sans);transition:all 0.15s}
.btn-secondary:hover{background:var(--surface-2)}
.btn-secondary:active{transform:scale(0.98)}
.btn-dark{background:var(--green-700);color:#e8f0d8;border:none}
.btn-dark:hover{background:var(--green-600)}
.btn-sm{font-size:11px;padding:5px 10px;border-radius:var(--r-sm);cursor:pointer;border:0.5px solid var(--border-2);background:#fff;color:var(--text-primary);font-family:var(--font-sans);transition:all 0.12s}
.btn-sm:hover{background:var(--surface-2)}
.btn-sm.green{background:var(--green-100);border-color:var(--green-400);color:var(--green-700)}

/* ── SEGMENT CONTROL ── */
.seg{display:flex;background:var(--surface-2);border-radius:var(--r-md);padding:3px;gap:3px;margin-bottom:10px}
.seg-b{flex:1;padding:7px 4px;font-size:11px;border:none;border-radius:8px;cursor:pointer;background:transparent;color:var(--text-muted);font-family:var(--font-sans);font-weight:500;transition:all 0.15s}
.seg-b.active{background:#fff;color:var(--text-primary);box-shadow:var(--shadow)}

/* ── METRICS / STATS ── */
.mets{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.met{background:var(--surface-2);border-radius:var(--r-md);padding:10px;text-align:center;transition:all 0.2s}
.met.live{background:var(--green-100);border:0.5px solid var(--green-300)}
.met-v{font-size:20px;font-weight:600;font-family:var(--font-mono);color:var(--text-primary)}
.met.live .met-v{color:var(--green-700)}
.met-l{font-size:10px;color:var(--text-muted);margin-top:2px;letter-spacing:0.02em}
.met.live .met-l{color:var(--green-600)}

/* ── LISTA PIANTE ── */
.tree-item{background:#fff;border:0.5px solid var(--border);border-radius:var(--r-lg);padding:10px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:all 0.15s;box-shadow:var(--shadow)}
.tree-item:hover{border-color:var(--border-2);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.tree-code{font-size:10px;font-family:var(--font-mono);background:var(--surface-2);padding:3px 7px;border-radius:5px;color:var(--text-muted);flex-shrink:0;border:0.5px solid var(--border)}
.tree-info{flex:1;min-width:0}
.tree-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic;font-family:var(--font-serif)}
.tree-loc{font-size:11px;color:var(--text-muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-meta{font-size:10px;color:var(--text-muted);margin-top:3px;font-family:var(--font-mono)}
.cpc-badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:9px;flex-shrink:0;letter-spacing:0.02em}
.cA{background:#DBEAFE;color:#1D4ED8;border:0.5px solid #93C5FD}
.cB{background:#DCFCE7;color:#15803D;border:0.5px solid #86EFAC}
.cC{background:#FEF9C3;color:#A16207;border:0.5px solid #FDE047}
.cCD{background:#FFEDD5;color:#C2410C;border:0.5px solid #FED7AA}
.cD{background:#FEE2E2;color:#B91C1C;border:0.5px solid #FCA5A5}

/* ── CPC SUMMARY ── */
.cpc-row{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:8px}
.cpc-cell{text-align:center;border-radius:var(--r-sm);padding:6px 4px}
.cpc-cell .cv{font-size:17px;font-weight:600;font-family:var(--font-mono)}
.cpc-cell .cl{font-size:9px;margin-top:1px;font-weight:600;letter-spacing:0.04em}

/* ── CLINOMETRO CAMERA ── */
.clino-cam-card{border-radius:var(--r-lg);overflow:hidden;border:0.5px solid var(--green-800);margin-bottom:10px;background:#000;user-select:none;-webkit-user-select:none}
.clino-cam-wrap{position:relative;width:100%;background:#0d1a0d;min-height:55vh;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none}
.clino-cam-wrap video{width:100%;display:block}
.cam-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:6px;z-index:1}
/* Mirino — sempre visibile sopra video */
.clino-overlay{position:absolute;inset:0;pointer-events:none;z-index:10;display:flex;align-items:center;justify-content:center}
.crosshair-wrap{position:relative;width:80px;height:80px}
.ch-h{position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(110,232,122,0.95);transform:translateY(-50%);box-shadow:0 0 4px rgba(110,232,122,0.5)}
.ch-v{position:absolute;left:50%;top:0;bottom:0;width:2px;background:rgba(110,232,122,0.95);transform:translateX(-50%);box-shadow:0 0 4px rgba(110,232,122,0.5)}
.ch-dot{position:absolute;top:50%;left:50%;width:8px;height:8px;border:2px solid rgba(110,232,122,0.95);border-radius:50%;transform:translate(-50%,-50%)}
/* Angoli decorativi ai bordi del mirino */
.ch-tl,.ch-tr,.ch-bl,.ch-br{position:absolute;width:14px;height:14px;border-color:rgba(110,232,122,0.7);border-style:solid}
.ch-tl{top:0;left:0;border-width:2px 0 0 2px}
.ch-tr{top:0;right:0;border-width:2px 2px 0 0}
.ch-bl{bottom:0;left:0;border-width:0 0 2px 2px}
.ch-br{bottom:0;right:0;border-width:0 2px 2px 0}
/* HUD */
.clino-hud{position:absolute;top:10px;left:12px;pointer-events:none;z-index:11}
.hud-angle-wrap{line-height:1}
.hud-angle{font-size:52px;font-weight:500;font-family:var(--font-mono);color:#6ee87a;text-shadow:0 2px 8px rgba(0,0,0,0.9)}
.hud-unit{font-size:18px;color:#6ee87a;text-shadow:0 1px 4px rgba(0,0,0,0.8)}
.clino-badge{font-size:10px;padding:3px 8px;border-radius:8px;display:inline-flex;align-items:center;gap:4px;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);margin-top:5px}
.hud-tilt-bar{position:absolute;bottom:0;left:0;right:0;height:5px;background:rgba(255,255,255,0.12);z-index:11}
.hud-tilt-fill{height:100%;background:#6ee87a;transition:width 0.08s,margin-left 0.08s}
/* Pulsante sensori in basso al viewfinder */
.sensor-bar{padding:8px 12px;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:space-between;gap:8px;position:absolute;bottom:5px;right:8px;z-index:12;border-radius:var(--r-sm)}
/* Pulsanti cattura */
.step-instruction{font-size:12px;color:var(--text-muted);background:var(--surface-2);border-radius:var(--r-sm);padding:9px 12px;border-left:3px solid var(--green-400);margin-bottom:9px;line-height:1.5}
.cap-btn{width:100%;padding:15px 14px;font-size:14px;font-weight:500;border:none;border-radius:var(--r-md);cursor:pointer;display:flex;align-items:center;gap:10px;transition:all 0.15s;margin-bottom:8px;font-family:var(--font-sans)}
.cap-btn:last-child{margin-bottom:0}
.cap-btn:active{transform:scale(0.97)}
.cap-ready{background:var(--green-600);color:#e8f0d8}
.cap-ready:hover{background:var(--green-700)}
.cap-done{background:var(--green-100);color:var(--green-700);border:0.5px solid var(--green-300)}
.cap-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center}
.clino-angle{font-size:54px;font-weight:500;font-family:var(--font-mono);color:#6ee87a;line-height:1;letter-spacing:-2px}
.clino-unit{font-size:16px;color:#6ee87a}
.clino-lbl{font-size:10px;color:var(--green-400);text-transform:uppercase;letter-spacing:0.08em}
.tilt-track{width:88%;height:5px;background:var(--green-800);border-radius:3px;position:relative;overflow:hidden}
.tilt-fill{height:100%;background:#6ee87a;border-radius:3px;transition:width 0.08s,margin-left 0.08s}
.clino-info{display:flex;gap:20px;margin-top:2px}
.cl-info-item{text-align:center;font-size:10px;color:var(--green-400)}
.cl-info-val{font-family:var(--font-mono);font-size:12px;color:#6ee87a;display:block}
.sbadge{font-size:10px;padding:3px 9px;border-radius:10px;display:inline-flex;align-items:center;gap:4px}
.s-on{background:rgba(110,232,122,0.1);color:#6ee87a;border:0.5px solid rgba(110,232,122,0.3)}
.s-off{background:var(--surface-2);color:var(--text-muted);border:0.5px solid var(--border)}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ang-row{display:flex;gap:6px}
.ang-btn{flex:1;padding:9px 6px;border:0.5px solid var(--border);border-radius:var(--r-md);cursor:pointer;background:#fff;color:var(--text-primary);text-align:center;transition:all 0.15s;box-shadow:var(--shadow)}

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs, deleteDoc, onSnapshot }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyDV5uXrZqtoPYWsAPtgJu64qMFyaHR8urQ",

      projectId:         "arbovta",

      messagingSenderId: "525749677894",
      appId:             "1:525749677894:web:9a9fa81156840a64b2bf47"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    /* ── Esponi funzioni Firestore al codice globale ── */
    window._fb = {

      /* Salva una singola pianta */
      async saveTree(tree) {
        try {
          await setDoc(doc(db, 'trees', String(tree.id)), tree);
        } catch(e) { console.warn('FB saveTree:', e); }
      },

      /* Elimina una pianta */
      async deleteTree(id) {
        try {
          await deleteDoc(doc(db, 'trees', String(id)));
        } catch(e) { console.warn('FB deleteTree:', e); }
      },

      /* Carica tutte le piante (primo avvio / pull) */
      async loadAll() {
        try {
          const snap = await getDocs(collection(db, 'trees'));
          return snap.docs.map(d => d.data());
        } catch(e) { console.warn('FB loadAll:', e); return []; }
      },

      /* Listener in tempo reale — aggiorna archivio quando cambia su cloud */
      listenAll(callback) {
        return onSnapshot(collection(db, 'trees'), snap => {
          const trees = snap.docs.map(d => d.data());
          callback(trees);
        }, e => console.warn('FB listen:', e));
      }
    };

    /* ── Indicatore connessione ── */
    const dot = document.getElementById('fb-dot');
    if (dot) { dot.style.background = '#6ee87a'; dot.title = 'Firebase connesso'; }
    window._fbReady = true;

function navTab(i){ return document.querySelectorAll('.nav-tab')[i]; }
function go(v,el){

}

function render(v){
  const c=document.getElementById('content');
  const map={lista:renderLista,specie:renderSpecie,misure:renderMisure,scheda:renderScheda,mappa:renderMappa};
  c.innerHTML = (map[v]||renderLista)();
  if(v==='misure') {
    /* Avvia sensore immediatamente (non richiede gesto su Android) */
    setTimeout(()=>{
      if('DeviceOrientationEvent' in window && typeof DeviceOrientationEvent.requestPermission!=='function'){
        startSensor();
      }
    }, 100);
    /* Camera NON si avvia automaticamente — l'utente usa il pulsante dedicato */
  }
  if(v!=='misure' && G.clino._stream){
    G.clino._stream.getTracks().forEach(t=>t.stop());
    G.clino._stream=null;
  }
  if(v==='mappa') ensureLeaflet(()=>setTimeout(initLeafletMap,150));
  if(v==='scheda') setTimeout(restoreVTAui, 100);
}

async function loadFromFirebase() {
  const btn = document.querySelector('[onclick="loadFromFirebase()"]');
  const status = document.getElementById('fb-load-status');
  if (!window._fb) {
    if (status) status.textContent = '⚠ Firebase non disponibile';
    return;
  }
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Caricamento...'; }
  if (status) status.textContent = 'Connessione a Firebase...';
  try {
    const cloudTrees = await window._fb.loadAll();
    if (!cloudTrees.length) {
      if (status) status.textContent = '⚠ Nessun dato trovato su Firebase';
      if (btn) { btn.disabled = false; btn.textContent = '☁ Carica da Firebase'; }
      return;
    }
    /* Merge e salva */
    const map = new Map(G.trees.map(t => [String(t.id), t]));
    cloudTrees.forEach(t => map.set(String(t.id), t));
    G.trees = [...map.values()];
    try { localStorage.setItem('arbovta-trees', JSON.stringify(G.trees)); } catch(e) {}

    /* Ricostruisci G_projects dai dati recuperati se è vuoto */
    if (G_projects.length === 0 && G.trees.length > 0) {
      migrateProjects();
    }

    render('lista');
    if (status) status.textContent = `✓ Recuperati ${G.trees.length} rilievi`;
    console.log('ArboRisk FB: caricato', G.trees.length, 'piante');
  } catch(e) {
    console.error('loadFromFirebase error:', e);
    if (status) status.textContent = '⚠ Errore: ' + e.message;
    if (btn) { btn.disabled = false; btn.textContent = '☁ Carica da Firebase'; }
  }
}

function deleteTree(id){
  const t = G.trees.find(x => x.id === id);
  if(!t) return;
  if(!confirm(`Eliminare il rilievo #${t.id} — ${t.specie}?\nQuesta operazione non è reversibile.`)) return;
  G.trees = G.trees.filter(x => x.id !== id);
  saveTrees();
  /* Elimina anche da Firebase */
  if (window._fb) window._fb.deleteTree(id);
  render('lista');
}

function saveRilievo(){
  if(!G.form.codice || !G.form.specie){ alert('Inserire almeno Codice rilievo e Specie.'); return; }

  /* Ricalcola IR e CPC prima di salvare */
  updateRisk();

  const data = {
    id:             G.form.codice,
    specie:         G.form.specie,
    cliente:        G.form.cliente || '',
    ubicazione:     G.form.ubicazione || '',
    localita:       G.form.localita || '',
    indirizzo:      G.form.indirizzo || '',
    sito:           G.form.sito || '',
    data:           G.form.data || new Date().toISOString().split('T')[0],
    cpc:            G.form.cpc || 'A',
    rischio:        G.form.pericolosita || 'Trascurabile',
    lat:            parseFloat(G.form.lat) || 0,
    lng:            parseFloat(G.form.lng) || 0,
    h:              G.form.h   || 0,
    dbh:            G.form.dbh || 0,
    cw:             G.form.cw  || 0,
    cd:             G.form.cd  || 0,
    disposizione:   G.form.disposizione || '',
    stazione:       G.form.stazione || '',
    suolo:          G.form.suolo || '',
    pavimentazione: G.form.pavimentazione || '',
    sitoCon:        G.form.sitoCon || '',
    posizSoc:       G.form.posizSoc || '',
    conflitti:      G.form.conflitti || '',
    fattoreContatto:    G.form.fattoreContatto || '',
    fattoreContattoNum: G.form.fattoreContattoNum || 0,
    pericolosita:       G.form.pericolosita || '',
    pericolosita_num:   G.form.pericolosita_num || 0,
    indiceRischio:      G.form.indiceRischio || 0,
    fattoreDanno:       G.form.fattoreDanno || '',
    fattoreDimensionale:G.form.fattoreDimensionale || 0,
    giudVeg:        G.form.giudVeg || '',
    giudFisio:      G.form.giudFisio || '',
    giudBiomec:     G.form.giudBiomec || '',
    prescrizioni:   G.form.prescrizioni || '',
    schedaMode:     G.form.schedaMode || 'ordinaria',
    vta:            G.form.vta || {},
    photos:         G.form.photos || [],
    _editedByUser:  true,
    _savedAt:       new Date().toISOString()
  };

  if(G.form._editingId) {
    /* Modifica pianta esistente */
    const idx = G.trees.findIndex(x => x.id === G.form._editingId);
    if(idx >= 0) {
      G.trees[idx] = { ...G.trees[idx], ...data };
      saveTrees();
      if(window._fb) window._fb.saveTree(G.trees[idx]); /* ← Firebase anche su modifica */
      go('lista', navTab(0)); resetNav();
      setTimeout(()=>{
        /* Feedback visivo breve */
        const items = document.querySelectorAll('.tree-item');
        items.forEach(el => {
          if(el.querySelector('.tree-code')?.textContent.includes(data.id)){
            el.style.background='var(--green-100)';
            setTimeout(()=>el.style.background='',1200);
          }
        });
      }, 100);
      return;
    }
  }

  /* Nuova pianta */
  G.trees.push(data);
  saveTrees();
  if(window._fb) window._fb.saveTree(data);
  /* Aggiungi al progetto corrente */
  if(G_nav.progettoId){
    const cl=G_projects.find(x=>x.id===G_nav.clienteId);
    const pr=cl&&cl.progetti.find(x=>x.id===G_nav.progettoId);
    if(pr&&!pr.rilievi.includes(String(data.id))) pr.rilievi.push(String(data.id));
    saveProjects();
  }
  go('lista', navTab(0)); resetNav();
}

function openFullscreenCamera(videoId, onSnap, onClose, label) {
  /* Crea overlay fullscreen */
  const overlay = document.createElement('div');
  overlay.id = 'cam-fs-overlay';
  overlay.className = 'cam-fullscreen';
  overlay.innerHTML = `
    <video id="cam-fs-video" autoplay playsinline muted style="flex:1;width:100%;height:100%;object-fit:cover"></video>
    <div class="cam-fullscreen-bar">
      <button class="cam-fullscreen-close" onclick="closeFullscreenCamera()">✕</button>
      <button class="cam-fullscreen-snap" onclick="snapFullscreenCamera()"></button>
      <div class="cam-fullscreen-label">${label||''}</div>
    </div>`;
  document.body.appendChild(overlay);

  /* Avvia stream sulla cam posteriore */
  const constraints = {
    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
    audio: false
  };
  navigator.mediaDevices.getUserMedia(constraints).then(stream => {
    G.ai.cameraStream = stream;
    const video = document.getElementById('cam-fs-video');
    if(video){ video.srcObject = stream; video.play(); }
    overlay._onSnap = onSnap;
    overlay._onClose = onClose;
  }).catch(err => {
    closeFullscreenCamera();
    alert('Fotocamera non disponibile: ' + err.message);
  });
}

function snapFullscreenCamera() {
  const video = document.getElementById('cam-fs-video');
  const overlay = document.getElementById('cam-fs-overlay');
  if(!video || !overlay) return;
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  if(overlay._onSnap) overlay._onSnap(dataUrl);
}

function closeFullscreenCamera() {
  const overlay = document.getElementById('cam-fs-overlay');
  if(overlay) {
    if(overlay._onClose) overlay._onClose();
    overlay.remove();
  }
  if(G.ai.cameraStream) {
    G.ai.cameraStream.getTracks().forEach(t => t.stop());
    G.ai.cameraStream = null;
  }
}

async function startCamera(){
  const type = G.ai.currentPhotoType || G.ai.activeType || 'Pianta intera';
  openFullscreenCamera(
    'cam-video',
    (dataUrl) => {
      /* Snap: comprimi e aggiungi foto */
      fetch(dataUrl).then(r=>r.blob()).then(blob => {
        compressPhoto(blob).then(compressed => {
          addPhoto(compressed, type);
        });
      });
    },
    null,
    type
  );
}
function snapPhoto(){
  const v=document.getElementById('cam-video'), c=document.getElementById('cam-canvas');
  c.width=v.videoWidth; c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  addPhoto(c.toDataURL('image/jpeg',0.85), G.ai.currentPhotoType||G.ai.activeType||'Pianta intera');
}
function loadFiles(e){

const PLANTNET_PROXY = 'https://arbotva-proxy.piccini-carlo-augusto.workers.dev/';

async function analyzePhotos(){
  const lb=document.getElementById('loading-box');
  const rc=document.getElementById('result-card');
  lb.style.display='block'; if(rc) rc.style.display='none';
  const msgs=[
    ['Invio foto a PlantNet...','Caricamento immagini'],
    ['Analisi morfologica...','Confronto con database botanico globale'],
    ['Calcolo confidenza...','Valutazione caratteri diagnostici'],
  ];
  let step=0;
  const lt=setInterval(()=>{
    if(step<msgs.length){
      const el=document.getElementById('loading-txt');
      const el2=document.getElementById('loading-sub');
      if(el) el.textContent=msgs[step][0];
      if(el2) el2.textContent=msgs[step][1];
      step++;
    }
  },1000);
  try {
    const photos=G.ai.photos.slice(0,5);
    if(!photos.length) throw new Error('Carica almeno una foto prima di analizzare');
    const formData=new FormData();
    for(const p of photos){
      const res=await fetch(p.dataUrl);
      const blob=await res.blob();
      formData.append('images',blob,'photo.jpg');
      const organMap={'Foglie':'leaf','Tronco':'bark','Radici':'other','Colletto':'other','Chioma':'flower','Pianta intera':'habit'};
      formData.append('organs',organMap[p.type]||'auto');
    }
    const response=await fetch(PLANTNET_PROXY,{method:'POST',body:formData});
    if(!response.ok){const err=await response.text();throw new Error(`PlantNet ${response.status}: ${err.substring(0,200)}`);}
    const data=await response.json();
    clearInterval(lt);
    if(!data.results||!data.results.length) throw new Error('Nessun risultato — prova con foto più nitide di foglie o corteccia');
    const best=data.results[0];
    const conf=Math.round(best.score*100);
    const result={
      scientific_name:best.species.scientificNameWithoutAuthor,
      common_name:best.species.commonNames?.[0]||best.species.scientificNameWithoutAuthor,
      family:best.species.family?.scientificNameWithoutAuthor||'',
      confidence:conf,
      diagnostic_chars:[
        `Famiglia: ${best.species.family?.scientificNameWithoutAuthor||'—'}`,
        `Genere: ${best.species.genus?.scientificNameWithoutAuthor||'—'}`,
        `Score: ${(best.score*100).toFixed(1)}%`,
        `Foto analizzate: ${photos.length}`,
      ],
      vta_notes:`Identificata da PlantNet con confidenza ${conf}%. Verificare in campo prima di inserire in scheda VTA.`,
      alternatives:data.results.slice(1,3).map(r=>({
        scientific_name:r.species.scientificNameWithoutAuthor,
        common_name:r.species.commonNames?.[0]||r.species.scientificNameWithoutAuthor,
        confidence:Math.round(r.score*100),
        key_difference:`Famiglia: ${r.species.family?.scientificNameWithoutAuthor||'—'}`
      })),
      caution:conf<50?'Confidenza bassa — aggiungi foto di foglie e corteccia':null,
      source:'PlantNet'
    };
    G.ai.result=result;
    G.ai.history.unshift({result,date:new Date().toLocaleDateString('it-IT'),thumb:G.ai.photos[0]?.dataUrl,photoCount:photos.length});
    displayResult(result);
  } catch(e){
    clearInterval(lt);
    console.error('PlantNet error:',e);
    lb.style.display='none';
    if(rc){
      rc.style.display='block';
      rc.innerHTML=`<div style="padding:16px;text-align:center">
        <div style="font-size:28px;margin-bottom:8px">⚠</div>
        <div style="font-weight:600;margin-bottom:6px;color:var(--red)">Errore riconoscimento</div>
        <div style="font-size:11px;color:var(--text-muted);line-height:1.6;margin-bottom:12px">${e.message}</div>
        <button onclick="analyzePhotos()" style="padding:8px 20px;background:var(--green-600);color:#fff;border:none;border-radius:var(--r-md);cursor:pointer;font-size:13px;font-family:var(--font-sans)">Riprova</button>
      </div>`;
    }
    return;
  }
  lb.style.display='none';
}

  <!-- ── DISTANZE ── -->
  <div class="card">
    <div class="sec">Distanze orizzontali</div>

    <div style="margin-bottom:10px;padding:8px;background:#f0f7f0;border-radius:8px;border:1px solid var(--border-2)">

      <div style="display:flex;gap:8px;align-items:center">
        <button class="cap-btn" style="flex:1" onclick="measureDistClino()">

          <span>${cl.captured._distAngle!==undefined?'Angolo: '+(cl.captured._distAngle>=0?'+':'')+cl.captured._distAngle.toFixed(1)+'°':'Cattura angolo alla base'}</span>
        </button>
        <button onclick="clearDistMeas()" style="padding:8px 10px;border-radius:8px;border:1px solid var(--border-2);background:#fff;font-size:12px">✕</button>

      α_base = ${fa(cl.captured.base)}°<br>

  <!-- ── RISULTATI ── -->

      <span style="font-family:var(--font-mono);font-weight:600;color:var(--text-primary)">

/* ── Camera clinometro — identica a startCamera() del tab Specie ── */
async function startClinoCamera(firstTarget){
  /* Attiva sensore */
  if('DeviceOrientationEvent' in window){
    if(typeof DeviceOrientationEvent.requestPermission==='function'){
      try{const s=await DeviceOrientationEvent.requestPermission();if(s==='granted')startSensor();}
      catch(e){}
    } else { startSensor(); }
  }

  const hints = {
    base: 'Punta il mirino sulla <b>base del tronco</b> e premi cattura',
    cw_l: 'Punta il mirino sul <b>bordo sinistro</b> della chioma e premi cattura',
    dbh_l: 'Punta il mirino sul <b>bordo sinistro</b> del tronco e premi cattura'
  };

  const overlay = document.createElement('div');
  overlay.id = 'cam-fs-overlay';
  overlay.className = 'cam-fullscreen';
  overlay.innerHTML = `
    <video id="cam-fs-video" autoplay playsinline muted style="flex:1;width:100%;height:100%;object-fit:cover"></video>
    <!-- Linea orizzontale -->
    <div style="position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(100,255,100,0.8);pointer-events:none"></div>
    <!-- Linea verticale -->
    <div style="position:absolute;left:50%;top:0;bottom:0;width:2px;background:rgba(100,255,100,0.8);transform:translateX(-50%);pointer-events:none"></div>
    <!-- Cerchio con croce interna -->
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;border:2px solid rgba(100,255,100,0.8);border-radius:50%;pointer-events:none">
      <!-- croce orizzontale interna -->
      <div style="position:absolute;top:50%;left:20%;right:20%;height:1.5px;background:rgba(100,255,100,0.9);transform:translateY(-50%)"></div>
      <!-- croce verticale interna -->
      <div style="position:absolute;left:50%;top:20%;bottom:20%;width:1.5px;background:rgba(100,255,100,0.9);transform:translateX(-50%)"></div>
    </div>
    <div id="fs-clino-angle" style="position:absolute;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);color:#6eff6e;font-size:28px;font-weight:700;font-family:monospace;padding:8px 20px;border-radius:12px">0.0°</div>
    <div class="cam-fullscreen-bar">
      <button class="cam-fullscreen-close" onclick="closeClinoFullscreen()">✕</button>
      <button class="cam-fullscreen-snap" onclick="captureFromOverlay()" style="background:#6eff6e"></button>
      <div class="cam-fullscreen-label" id="fs-clino-label">${hints[firstTarget]||'Inquadra e cattura'}</div>
    </div>`;
  overlay._pendingTarget = firstTarget;
  /* Per la misura distanza, cattura un solo angolo */
  overlay._isDistMeas = (firstTarget === 'dist');
  document.body.appendChild(overlay);

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}},audio:false
    });
    G.clino._stream = stream;
    const v = document.getElementById('cam-fs-video');
    if(v){ v.srcObject=stream; v.play(); }
  } catch(e){
    overlay.remove();
    alert('Fotocamera non disponibile — usa il sensore di inclinazione.');
  }
}

function captureFromOverlay(){
  const overlay = document.getElementById('cam-fs-overlay');
  if(!overlay) return;
  const target = overlay._pendingTarget;
  if(!target) return;

  /* Misura distanza: cattura angolo e chiude */
  if(overlay._isDistMeas){
    G.clino.captured._distAngle = G.clino.angle;
    closeClinoFullscreen();
    renderClino();
    return;
  }

  /* Cattura angolo e aggiorna il pulsante */
  captureA(target);

  /* Imposta prossimo target */
  const nextMap = {base:'top', cw_l:'cw_r', dbh_l:'dbh_r'};
  const next = nextMap[target];
  if(next){
    overlay._pendingTarget = next;
  } else {
    overlay._pendingTarget = null;
  }
}

function closeClinoFullscreen(){
  const overlay=document.getElementById('cam-fs-overlay');
  if(overlay) overlay.remove();
  if(G.clino._stream){G.clino._stream.getTracks().forEach(t=>t.stop());G.clino._stream=null;}
}

function updateClinoFSAngle(angle){
  const el=document.getElementById('fs-clino-angle');
  if(el) el.textContent = (angle>=0?'+':'')+angle.toFixed(1)+'°';
}

function captureClinoAngle(){
  const label=document.getElementById('fs-clino-label');
  /* Delega alla logica esistente del clinometro */
  const angleEl=document.getElementById('clino-angle')||document.getElementById('fs-clino-angle');
  const angle=G.clino.lastAngle||0;
  const captured=G.clino.captured||{};
  if(!captured.alpha){
    captured.alpha=angle;
    G.clino.captured=captured;
    if(label) label.textContent='✓ Base catturata — inquadra la cima';
  } else if(!captured.beta){
    captured.beta=angle;
    G.clino.captured=captured;
    if(label) label.textContent='✓ Cima catturata — chiudi';
    setTimeout(()=>{ closeClinoFullscreen(); render('misure'); },800);
  }
}

function resetClino(){
  G.clino.captured={};
  G.clino.meas={h:null,dbh:null,cw:null,cd:null};
  /* Aggiorna UI senza chiudere/riaprire camera */
  /* Reset risultati */
  ['cmv-h','cmv-dbh','cmv-circ','cmv-cw','cmv-cd'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.textContent='—';
  });
  /* Reset pulsanti cattura */
  ['base','cw_l','dbh_l'].forEach(id=>{
    const btn=document.querySelector('[onclick="captureA(\''+id+'\')"]');
    if(btn){
      btn.classList.remove('cap-done','cap-locked');
      btn.classList.add('cap-ready');
      const icon=btn.querySelector('.cap-icon'); if(icon) icon.textContent='◉';
      const lbl=btn.querySelector('span:last-child');
      if(lbl) lbl.textContent=id==='base'?'Cattura — Base tronco':id==='cw_l'?'Cattura — Bordo sinistro':'Cattura — Bordo sinistro';
    }
  });
  ['top','cw_r','dbh_r'].forEach(id=>{
    const btn=document.querySelector('[onclick="captureA(\''+id+'\')"]');
    if(btn){
      btn.classList.remove('cap-done','cap-ready');
      btn.classList.add('cap-locked');
      const icon=btn.querySelector('.cap-icon'); if(icon) icon.textContent='◉';
      const lbl=btn.querySelector('span:last-child');
      if(lbl) lbl.textContent=id==='top'?'Cattura — Apice cima':id==='cw_r'?'Cattura — Bordo destro':'Cattura — Bordo destro';
    }
  });
  /* Reset hint */
  const hint=document.getElementById('height-hint');
  if(hint) hint.innerHTML='<b>Passo 1</b> — Punta il mirino sulla <b>base del tronco</b> e cattura';
  const fbox=document.getElementById('cl-formula'); if(fbox) fbox.textContent='';
}

function setCParam(p,btn){
  G.clino.param=p;
  document.querySelectorAll('#content .seg-b').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['height','crown','dbh'].forEach(pp=>{
    const el=document.getElementById('cpanel-'+pp);
    if(el) el.style.display=pp===p?'':'none';
  });
}

function startSensor(){
  if(G.clino.sensorActive) return;
  G.clino.sensorActive=true;
  window.addEventListener('deviceorientation',onOrientation,true);
  const dot=document.getElementById('sensor-dot');
  const lbl=document.getElementById('sensor-lbl');
  if(dot){dot.style.color='#6ee87a';dot.style.animation='pulse-sensor 2s infinite';}
  if(lbl){lbl.textContent='sensore attivo';lbl.style.color='#6ee87a';}
}

function onOrientation(e){
  let b=e.beta||0, angle=b-90;
  if(angle>90) angle=180-angle;
  if(angle<-90) angle=-180-angle;
  G.clino.angle=parseFloat(angle.toFixed(1));
  G.clino.lastAngle=G.clino.angle;
  updateClinoDisplay();
  /* Aggiorna angolo nell'overlay fullscreen se aperto */
  updateClinoFSAngle(G.clino.angle);
}

function updateClinoDisplay(){
  const a=G.clino.angle;
  const ae=document.getElementById('cl-angle');
  const tf=document.getElementById('cl-tilt');
  if(ae) ae.textContent=(a>=0?'+':'')+a.toFixed(1);
  if(tf){tf.style.width=Math.abs(a/90*50)+'%';tf.style.marginLeft=(a>=0?50:50+a/90*50)+'%';}
}

function captureA(target){
  /* Primo tap del gruppo → apri camera se non è già aperta */
  const firstOfGroup = {base:true, cw_l:true, dbh_l:true};
  const lastOfGroup  = {top:true,  cw_r:true,  dbh_r:true};
  const labelNext    = {base:'Punta il mirino sull\'<b>apice della cima</b> e cattura',
                        cw_l:'Punta il mirino sul <b>bordo destro</b> e cattura',
                        dbh_l:'Punta il mirino sul <b>bordo destro</b> del tronco e cattura'};

  if(firstOfGroup[target] && !document.getElementById('cam-fs-overlay')){
    startClinoCamera(target);
    return; /* La cattura avverrà dentro startClinoCamera */
  }

  /* Cattura angolo corrente */
  const a = G.clino.lastAngle || G.clino.angle || 0;
  G.clino.captured[target] = a;
  recalcAll();

  const fa = v => v!==undefined?(v>=0?'+':'')+v.toFixed(1)+'°':'—°';
  const labels = {top:'Cima', base:'Base tronco', cw_l:'Bordo sx', cw_r:'Bordo dx', dbh_l:'Bordo sx', dbh_r:'Bordo dx'};

  /* Aggiorna pulsante corrente */
  const btn = document.querySelector(`[onclick="captureA('${target}')"]`);
  if(btn){
    btn.classList.remove('cap-ready','cap-locked'); btn.classList.add('cap-done');
    btn.querySelector('.cap-icon').textContent = '✓';
    btn.querySelector('span:last-child').textContent = `${labels[target]||target}: ${fa(a)}`;
  }

  /* Sblocca pulsante successivo o chiudi camera */
  const nextMap = {base:'top', cw_l:'cw_r', dbh_l:'dbh_r'};
  if(nextMap[target]){
    const nextBtn = document.querySelector(`[onclick="captureA('${nextMap[target]}')"]`);
    if(nextBtn){nextBtn.classList.remove('cap-locked'); nextBtn.classList.add('cap-ready');}
    /* Aggiorna label nell overlay */
    const lbl = document.getElementById('fs-clino-label');
    if(lbl) lbl.innerHTML = labelNext[target]||'Cattura';
  }

  if(lastOfGroup[target]){
    /* Ultima misura del gruppo → chiudi camera */
    setTimeout(()=>{ closeClinoFullscreen(); }, 600);
  }

  /* Hint altezza */
  if(target==='base'){
    const hint=document.getElementById('height-hint');
    if(hint) hint.innerHTML='<b>Passo 2</b> — Punta il mirino sull\'<b>apice della cima</b> e cattura';
  }
}

function setDist(d){
  G.clino.dist=d;
  const el=document.getElementById('dist-in');if(el) el.value=d;
  recalcAll();
}

function setDistDBH(d){
  G.clino.distDBH=d;
  const el=document.getElementById('dist-dbh-in');
  if(el) el.value=d;
  recalcAll();
  renderClino();
}

function measureDistClino(){
  /* Apre la camera fullscreen per misurare la distanza orizzontale */
  const overlay = document.createElement('div');
  overlay.id = 'cam-fs-overlay';
  overlay.className = 'cam-fullscreen';
  overlay.innerHTML = `
    <video id="cam-fs-video" autoplay playsinline muted style="flex:1;width:100%;height:100%;object-fit:cover"></video>
    <!-- Linea orizzontale -->
    <div style="position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(100,255,100,0.8);pointer-events:none"></div>
    <!-- Linea verticale -->
    <div style="position:absolute;left:50%;top:0;bottom:0;width:2px;background:rgba(100,255,100,0.8);transform:translateX(-50%);pointer-events:none"></div>
    <!-- Cerchio con croce -->
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;border:2px solid rgba(100,255,100,0.8);border-radius:50%;pointer-events:none">
      <div style="position:absolute;top:50%;left:20%;right:20%;height:1.5px;background:rgba(100,255,100,0.9);transform:translateY(-50%)"></div>
      <div style="position:absolute;left:50%;top:20%;bottom:20%;width:1.5px;background:rgba(100,255,100,0.9);transform:translateX(-50%)"></div>
    </div>
    <div id="fs-clino-angle" style="position:absolute;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.6);color:#6eff6e;font-size:28px;font-weight:700;font-family:monospace;padding:8px 20px;border-radius:12px">0.0°</div>
    <div class="cam-fullscreen-bar">
      <button class="cam-fullscreen-close" onclick="closeClinoFullscreen()">✕</button>
      <button class="cam-fullscreen-snap" onclick="captureDistAngle()" style="background:#6eff6e"></button>
      <div class="cam-fullscreen-label">Punta alla <b>base del tronco</b> tenendo il clinometro a 1.30m dal suolo</div>
    </div>`;
  document.body.appendChild(overlay);
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}},audio:false
  }).then(stream => {
    G.clino._stream = stream;
    const v = document.getElementById('cam-fs-video');
    if(v){ v.srcObject=stream; v.play(); }
    /* Aggiorna angolo in tempo reale */
    overlay._angleInterval = setInterval(()=>{
      const el=document.getElementById('fs-clino-angle');
      if(el) el.textContent=(G.clino.angle>=0?'+':'')+G.clino.angle.toFixed(1)+'°';
    },100);
  }).catch(err=>{
    closeClinoFullscreen();
    alert('Fotocamera non disponibile: '+err.message);
  });
}

function captureDistAngle(){
  const a = G.clino.angle;
  G.clino.captured._distAngle = a;
  closeClinoFullscreen();
  renderClino();
}

function clearDistMeas(){
  delete G.clino.captured._distAngle;
  renderClino();
}

function applyDistMeas(target){
  const a = G.clino.captured._distAngle;
  if(a===undefined) return;
  const d = parseFloat((1.30/Math.tan(Math.abs(a)*Math.PI/180)).toFixed(1));
  if(!isFinite(d)||d<=0) return;
  if(target==='h'){
    G.clino.dist = d;
    const el=document.getElementById('dist-in');
    if(el) el.value=d;
  } else {
    G.clino.distDBH = d;
    const el=document.getElementById('dist-dbh-in');
    if(el) el.value=d;
  }
  recalcAll();
  renderClino();
}

function recalcAll(){
  const c=G.clino, d=c.dist||15;
  /* Legge distDBH dal campo se visibile, altrimenti dallo stato */
  const elDBH=document.getElementById('dist-dbh-in');
  if(elDBH) c.distDBH=parseFloat(elDBH.value)||c.distDBH||1;
  const dDBH=c.distDBH||1;
  const rad=a=>a*Math.PI/180;
  /* Altezza */
  if(c.captured.top!==undefined && c.captured.base!==undefined){
    c.meas.h=parseFloat((d*(Math.tan(rad(c.captured.top))-Math.tan(rad(c.captured.base)))).toFixed(2));
    const el=document.getElementById('cmv-h');if(el) el.textContent=c.meas.h.toFixed(2);
  }
  /* Larghezza chioma */
  if(c.captured.cw_l!==undefined && c.captured.cw_r!==undefined){
    c.meas.cw=parseFloat((d*(Math.tan(rad(Math.abs(c.captured.cw_l)))+Math.tan(rad(Math.abs(c.captured.cw_r))))).toFixed(2));
    const el=document.getElementById('cmv-cw');if(el) el.textContent=c.meas.cw.toFixed(2);
  }
  /* Diametro — usa dDBH (distanza dal tronco, default 1m) */
  if(c.captured.dbh_l!==undefined && c.captured.dbh_r!==undefined){
    c.meas.dbh=parseFloat((dDBH*(Math.tan(rad(Math.abs(c.captured.dbh_l)))+Math.tan(rad(Math.abs(c.captured.dbh_r))))*100).toFixed(1));
    const dbhEl=document.getElementById('cmv-dbh');if(dbhEl) dbhEl.textContent=c.meas.dbh.toFixed(1);
    const circEl=document.getElementById('cmv-circ');if(circEl) circEl.textContent=(c.meas.dbh*Math.PI).toFixed(1);
  }
  /* Formula box */
  const fbox=document.getElementById('cl-formula');
  if(fbox){
    const fa=a=>a!==undefined?(a>=0?'+':'')+a.toFixed(1):'—';
    fbox.innerHTML=`H = d × (tan α<sub>cima</sub> − tan α<sub>base</sub>)<br>
      <b>d = ${d}m</b> | α_cima = ${fa(c.captured.top)}° | α_base = ${fa(c.captured.base)}°<br>
      <b>H = ${c.meas.h?c.meas.h.toFixed(2)+' m':'—'}</b><br>
      DBH = dDBH × (tan α<sub>sx</sub> + tan α<sub>dx</sub>) × 100 | <b>dDBH = ${dDBH}m</b>`;
  }
}

function transferToScheda(){
  const m=G.clino.meas;
  G.form.h=m.h; G.form.dbh=m.dbh; G.form.cw=m.cw; G.form.cd=m.cd;
  if(G.form._editingId){
    autosaveField('h',m.h); autosaveField('dbh',m.dbh);
    autosaveField('cw',m.cw); autosaveField('cd',m.cd);
  }
  go('scheda',navTab(3));
}

function renderSchedaSpeditiva(){
  const f=G.form;
  const gjd=()=>`<div class="gjd">${[['PESSIMO','#FCEBEB','#A32D2D'],['GRAVE','#FAECE7','#993C1D'],['MEDIOCRE','#FAEEDA','#BA7517'],['DISCRETO','#EAF3DE','#3B6D11'],['BUONO','#C0DD97','#27500A']].map(([v,bg,col])=>`<button type="button" class="gj" style="background:${bg};color:${col};border-color:${col}" onclick="setGjd(this)">${v}</button>`).join('')}</div>`;
  const peric=()=>`<div class="peric">${[['TRASCUR.',1,2,'#EAF3DE','#27500A'],['BASSO',3,4,'#FAEEDA','#633806'],['MODERATO',5,6,'#FAECE7','#4A1B0C'],['ELEVATO',7,8,'#FCEBEB','#501313'],['ESTREMO',9,10,'#F09595','#791F1F']].map(([v,n1,n2,bg,col])=>`<button type="button" class="per" data-v1="${n1}" data-v2="${n2}" data-cur="${n1}" style="background:${bg};color:${col};border-color:${col}" onclick="setPer(this)">${v} <span class="per-num" style="font-size:9px;opacity:0.7;margin-left:2px">${n1}</span></button>`).join('')}</div>`;

  const dimBanner=(f.h||f.dbh||f.cw||f.cd)?`<div class="dim-banner">
    <div class="dim-banner-title"><span>📐 Da clinometro</span><button class="btn-sm" style="font-size:10px;padding:2px 7px" onclick="go('misure',navTab(2))">Aggiorna</button></div>
    ${f.h?`<div class="dim-row"><span>Altezza totale</span><strong>${f.h.toFixed(2)} m</strong></div>`:''}
    ${f.dbh?`<div class="dim-row"><span>Diametro fusto</span><strong>${f.dbh.toFixed(1)} cm</strong></div>`:''}
    ${f.dbh?`<div class="dim-row"><span>Circonferenza</span><strong>${(f.dbh*Math.PI).toFixed(1)} cm</strong></div>`:''}
    ${f.cw?`<div class="dim-row"><span>Larghezza chioma</span><strong>${f.cw.toFixed(2)} m</strong></div>`:''}
  </div>`:`<div style="margin-top:6px;padding:8px 10px;background:var(--surface-2);border-radius:var(--r-sm);font-size:11px;color:var(--text-muted);display:flex;justify-content:space-between;align-items:center;border:0.5px solid var(--border)">
    <span>Nessuna misura da clinometro</span>
    <button class="btn-sm green" onclick="go('misure',navTab(2))">Apri clinometro</button>
  </div>`;

  const html=`
  <!-- Badge speditiva -->
  <div style="margin:8px 12px 0;padding:6px 10px;background:#fffbe6;border:1px solid #f0c040;border-radius:8px;display:flex;align-items:center;gap:8px">
    <span style="font-size:14px">⚡</span>
    <span style="font-size:11px;font-weight:600;color:#856404">VTA Speditiva</span>
    <button onclick="G.form.schedaMode='';renderScheda()" style="margin-left:auto;font-size:10px;padding:2px 8px;border-radius:6px;border:1px solid #ccc;background:#fff;color:var(--text-muted)">Cambia tipo</button>
  </div>

  <!-- DATI IDENTIFICATIVI -->
  <div class="card">
    <div class="sec">Dati identificativi</div>
    <div class="fg">
      <div class="field"><label>Codice rilievo *</label><input type="text" placeholder="es. 2049" value="${f.codice}" oninput="autosaveField('codice',this.value)"></div>
      <div class="field"><label>Data rilievo</label><input type="date" value="${f.data||''}" oninput="autosaveField('data',this.value)"></div>
    </div>
    <div class="field full"><label>Specie *</label><input type="text" placeholder="Nome scientifico o comune" value="${f.specie||''}" oninput="autosaveField('specie',this.value)"></div>
    <div class="fg" style="margin-top:7px;width:100%">
      <div class="field full" style="grid-column:1/-1">
        <div style="display:flex;gap:8px;width:100%">
          <div class="field" style="flex:1;min-width:0"><label>Cliente</label><input style="width:100%;box-sizing:border-box" type="text" placeholder="Nome cliente" value="${f.cliente||''}" oninput="autosaveField('cliente',this.value)"></div>
          <div class="field" style="flex:1;min-width:0"><label>Comune</label><input style="width:100%;box-sizing:border-box" type="text" placeholder="Comune..." value="${f.ubicazione||''}" oninput="autosaveField('ubicazione',this.value)"></div>
        </div>
        <div style="display:flex;gap:8px;width:100%;margin-top:7px">
          <div class="field" style="flex:1;min-width:0"><label>Località</label><input style="width:100%;box-sizing:border-box" type="text" placeholder="Frazione, quartiere..." value="${f.localita||''}" oninput="autosaveField('localita',this.value)"></div>
          <div class="field" style="flex:1;min-width:0"><label>Indirizzo</label><input style="width:100%;box-sizing:border-box" type="text" placeholder="Via, n° civico..." value="${f.indirizzo||''}" oninput="autosaveField('indirizzo',this.value)"></div>
        </div>
        <div style="display:flex;gap:8px;width:100%;margin-top:7px">
          <div class="field" style="flex:1;min-width:0"><label>Sito</label><select style="width:100%;box-sizing:border-box" onchange="autosaveField('sito',this.value)"><option>Seleziona...</option>${['giardino privato','giardino storico','giardino pubblico','parco privato','parco storico','parco pubblico','parco vacanze','parco RSA','parco albergo','aiuola stradale','parcheggio privato','parcheggio pubblico','cimitero','altro'].map(s=>`<option ${f.sito===s?'selected':''}>${s}</option>`).join('')}</select></div>
          <div class="field" style="flex:1;min-width:0"><label>Disposizione</label><select style="width:100%;box-sizing:border-box" onchange="autosaveField('disposizione',this.value)"><option>Seleziona...</option>${['singolo','filare','gruppo puro','gruppo misto','boschetto puro','boschetto misto','altro'].map(s=>`<option ${f.disposizione===s?'selected':''}>${s}</option>`).join('')}</select></div>
        </div>
      </div>
    </div>
    <!-- Georeferenziazione -->
    <div class="sec" style="margin-top:10px">Georeferenziazione</div>
    <div class="geo-btn" onclick="requestGPS()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      <span>Tocca per acquisire posizione GPS</span>
    </div>
    <div class="fg" style="margin-top:6px">
      <div class="field"><label>Latitudine</label><input type="number" step="any" placeholder="es. 44.0452" value="${f.lat||''}" oninput="autosaveField('lat',this.value)"></div>
      <div class="field"><label>Longitudine</label><input type="number" step="any" placeholder="es. 10.1056" value="${f.lng||''}" oninput="autosaveField('lng',this.value)"></div>
    </div>
  </div>

  <!-- DATI DIMENSIONALI -->
  <div class="card">
    <div class="sec">Dati dimensionali</div>
    ${dimBanner}
    <div class="fg" style="margin-top:8px">
      <div class="field"><label>Altezza (H) m</label><input type="number" step="0.1" value="${f.h||''}" oninput="autosaveField('h',parseFloat(this.value))"></div>
      <div class="field"><label>DBH cm</label><input type="number" step="0.1" value="${f.dbh||''}" oninput="autosaveField('dbh',parseFloat(this.value))"></div>
      <div class="field"><label>Largh. chioma m</label><input type="number" step="0.1" value="${f.cw||''}" oninput="autosaveField('cw',parseFloat(this.value))"></div>
      <div class="field"><label>Prof. chioma m</label><input type="number" step="0.1" value="${f.cd||''}" oninput="autosaveField('cd',parseFloat(this.value))"></div>
    </div>
    <div class="fg" style="margin-top:6px">
      <div class="field"><label>Stazione</label><select onchange="autosaveField('stazione',this.value)"><option>Seleziona...</option>${['terreno naturale','aiuola','pavimentazione permeabile','pavimentazione impermeabile','pendio','altro'].map(s=>`<option ${f.stazione===s?'selected':''}>${s}</option>`).join('')}</select></div>
      <div class="field"><label>Suolo</label><select onchange="autosaveField('suolo',this.value)"><option>Seleziona...</option>${['soffice','compatto','argilloso','sabbioso','ghiaioso','altro'].map(s=>`<option ${f.suolo===s?'selected':''}>${s}</option>`).join('')}</select></div>
      <div class="field"><label>Pavimentazione</label><select onchange="autosaveField('pavimentazione',this.value)"><option>Seleziona...</option>${['terreno nudo','prato','asfalto','calcestruzzo','autobloccante','ghiaia','altro'].map(s=>`<option ${f.pavimentazione===s?'selected':''}>${s}</option>`).join('')}</select></div>
    </div>
  </div>

  <!-- DIAGNOSI E VALUTAZIONE FINALE -->
  <div class="card">
    <div class="sec">Diagnosi e valutazione finale</div>

    <div class="field">
      <label>Giudizio fisiopatologico</label>
      <div class="gjd-wrap" data-field="giudFisio">${gjd()}</div>
    </div>
    <div class="field" style="margin-top:8px">
      <label>Giudizio vegetativo</label>
      <div class="gjd-wrap" data-field="giudVeg">${gjd()}</div>
    </div>
    <div class="field" style="margin-top:8px">
      <label>Pericolosità</label>
      <div class="peric-wrap" data-field="pericolosita" data-section="speditiva">${peric()}</div>
    </div>

    <!-- Fattore di contatto -->
    <div class="field" style="margin-top:8px">
      <label>Fattore di contatto (FC)</label>
      <div style="margin:6px 0 4px;padding:8px 10px;background:#f8f9fa;border-radius:8px;border:0.5px solid var(--border)">
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px">
          ${[
            {label:'Trascurabile',desc:'Area raramente frequentata',ns:[1,2],bg:['#DCFCE7','#DCFCE7'],tc:['#166534','#166534']},
            {label:'Basso',desc:'Frequentazione occasionale',ns:[3,4],bg:['#D1FAE5','#D1FAE5'],tc:['#14532D','#14532D']},
            {label:'Moderato',desc:'Parco / area pubblica',ns:[5,6],bg:['#FEF9C3','#FEF9C3'],tc:['#713F12','#713F12']},
            {label:'Elevato',desc:'Alta frequentazione',ns:[7,8],bg:['#FFEDD5','#FFEDD5'],tc:['#9A3412','#9A3412']},
            {label:'Estremo',desc:'Continua / critica',ns:[9,10],bg:['#FEE2E2','#FEE2E2'],tc:['#991B1B','#991B1B']},
          ].map(({label,desc,ns,bg,tc})=>`
            <div style="display:flex;flex-direction:column;gap:3px">
              <div style="font-size:9px;font-weight:600;color:var(--text-muted);text-align:center">${label}</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px">
                ${ns.map((n,i)=>{
                  const isOn=G.form.fattoreContattoNum===n;
                  return `<button type="button" data-fc="${n}"
                    style="padding:11px 0;border-radius:6px;border:2px solid ${isOn?tc[i]:'transparent'};
                    background:${isOn?tc[i]:bg[i]};color:${isOn?'#fff':tc[i]};
                    font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s"
                    onclick="setFCNum(${n})">${n}</button>`;
                }).join('')}
              </div>
              <div style="font-size:8px;color:var(--text-muted);text-align:center;line-height:1.2">${desc}</div>
            </div>
          `).join('')}
        </div>
      </div>
      <div id="fc-desc" style="margin-top:4px;font-size:11px;padding:6px 8px;border-radius:6px;background:#f0f7f0;color:var(--green-700);display:${G.form.fattoreContattoNum?'block':'none'}"></div>
    </div>

    <!-- IR + CPC -->
    <div class="risk-grid" id="risk-grid-sp" style="margin-top:10px">
      <div class="risk-card"><div class="risk-val" id="ir-v-sp">—</div><div class="risk-lbl">Indice di Rischio</div></div>
      <div class="risk-card" style="display:flex;flex-direction:column;align-items:center;gap:6px">
        <div class="risk-val r${(G.form.cpc||'A').replace('/','')}" id="cpc-v">${G.form.cpc||'A'}</div>
        <select id="cpc-select" onchange="setCPCManual(this.value)"
          style="font-size:11px;padding:3px 6px;border-radius:6px;border:0.5px solid var(--border);background:var(--surface);color:var(--text-primary);font-family:var(--font-mono);font-weight:600;cursor:pointer">
          ${['A','B','C','C/D','D'].map(c=>`<option value="${c}" ${(G.form.cpc||'A')===c?'selected':''}>${c}</option>`).join('')}
        </select>
        <div class="risk-lbl">Classe CPC</div>
      </div>
      <div class="risk-card"><div class="risk-val" id="peric-v" style="font-size:14px">—</div><div class="risk-lbl">Pericolosità</div></div>
      <div class="risk-card"><div class="risk-val" id="fd-v" style="font-size:16px">—</div><div class="risk-lbl">Fattore dimensionale</div></div>
    </div>

    <div class="field" style="margin-top:8px"><label>Prescrizioni</label>
      <textarea rows="3" placeholder="Interventi consigliati, tempistiche, priorità..." oninput="autosaveField('prescrizioni',this.value)">${f.prescrizioni||''}</textarea>
    </div>
    <div class="field" style="margin-top:7px"><label>Il rilevatore</label>
      <input type="text" value="Carlo Piccini — Dottore Agronomo" placeholder="Nome, titolo">
    </div>
  </div>

  <!-- FOTO (1 sola) -->
  <div class="card">
    <div class="sec">Foto rilievo</div>
    <div id="speditiva-photo-area">
      ${f.photos&&f.photos[0]?`<div style="position:relative;display:inline-block">
        <img src="${f.photos[0].dataUrl}" style="width:100%;border-radius:8px;max-height:280px;object-fit:cover">
        <button onclick="removeSpeditivaPhoto()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer">✕</button>
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px;text-align:center">${f.photos[0].tipo||'Foto rilievo'}</div>
      </div>`:`<button onclick="takeSpeditivaPhoto()" style="width:100%;padding:24px;border:2px dashed var(--border-2);border-radius:10px;background:var(--surface-2);color:var(--text-muted);font-size:13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px">
        <span style="font-size:28px">📷</span>
        <span>Scatta o carica una foto</span>
      </button>`}
    </div>
  </div>

  <div style="height:80px"></div>`; /* spazio per bottombar */

  return html;
}

function takeSpeditivaPhoto(){
  const input=document.createElement('input');
  input.type='file'; input.accept='image/*'; input.capture='environment';
  input.onchange=async e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      if(!G.form.photos) G.form.photos=[];
      G.form.photos[0]={dataUrl:ev.target.result,tipo:'Foto rilievo',ts:Date.now()};
      autosaveField('photos',G.form.photos);
      renderSchedaSpeditiva();
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

function removeSpeditivaPhoto(){
  if(G.form.photos) G.form.photos=[];
  autosaveField('photos',[]);
  renderSchedaSpeditiva();
}

function renderSezioneAnat(nome,formaHTML,difettiHTML,sevHTML,pericHTML,gjdHTML,gjdLabel){
  return `<div class="card">
    <div class="sec">${nome}</div>
    <div class="field"><label>Forma / tipologia</label>${formaHTML}</div>
    <div class="field" style="margin-top:7px"><label>Difetti</label>${difettiHTML}</div>
    <div class="field" style="margin-top:7px"><label>Gravità</label>${sevHTML}</div>
    ${pericHTML?`<div class="field" style="margin-top:7px"><label>Pericolosità</label>${pericHTML}</div>`:''}
    ${gjdHTML&&gjdLabel?`<div class="field" style="margin-top:7px"><label>${gjdLabel}</label>${gjdHTML}</div>`:''}
    <div class="field" style="margin-top:7px"><label>Note</label><textarea placeholder="Osservazioni su ${nome.toLowerCase()}..."></textarea></div>
  </div>`;
}

    btn.style.background='var(--green-100)';

function setPer(btn){
  const pericEl=btn.closest('.peric');
  const wasOn=btn.classList.contains('on');
  pericEl.querySelectorAll('.per').forEach(b=>{
    b.classList.remove('on');
    const numEl=b.querySelector('.per-num');
    if(numEl){b.dataset.cur=b.dataset.v1;numEl.textContent=b.dataset.v1;}
  });
  if(wasOn){
    const cur=parseInt(btn.dataset.cur),v1=parseInt(btn.dataset.v1),v2=parseInt(btn.dataset.v2);
    const next=cur===v1?v2:v1;
    btn.dataset.cur=next;
    const numEl=btn.querySelector('.per-num');
    if(numEl) numEl.textContent=next;
    btn.classList.add('on');
  } else {
    btn.classList.add('on');
  }
  const num=parseInt(btn.dataset.cur);
  const sec=btn.closest('.card')?.querySelector('.sec')?.textContent?.trim()||'';
  autosave('per_'+sec, btn.textContent.split(' ')[0].trim());
  autosave('per_'+sec+'_num', num);
  const secLow=sec.toLowerCase();
  if(secLow.includes('radici')||secLow.includes('colletto')) autosave('per_rc_num',num);
  else if(secLow.includes('fusto')||secLow.includes('castello')) autosave('per_fc_num',num);
  else if(secLow.includes('branche')||secLow.includes('chioma')) autosave('per_bc_num',num);
  else if(secLow.includes('speditiva')||pericEl.dataset.field==='pericolosita'){
    G.form.pericolosita_num=num;
    autosaveField('pericolosita_num',num);
    /* Salva anche la label testuale della pericolosità */
    const label = btn.textContent.replace(/\d/g,'').trim();
    autosaveField('pericolosita', label);
    /* Aggiorna subito IR e CPC */
    updateRisk();
  }
  setTimeout(updateRisk,50);
}


/* ── AUTOSAVE — scrive immediatamente in G.trees e localStorage ── */
function autosave(key, value) {
  if(!G.form._editingId) return;
  if(!G.form.vta) G.form.vta = {};
  G.form.vta[key] = value;
  const idx = G.trees.findIndex(x => x.id === G.form._editingId);
  if(idx >= 0) {
    if(!G.trees[idx].vta) G.trees[idx].vta = {};
    G.trees[idx].vta[key] = value;
    try { localStorage.setItem('arbovta-trees', JSON.stringify(G.trees)); } catch(e) {}
    if(window._fb) window._fb.saveTree(G.trees[idx]);
  }
}
function autosaveField(key, value) {
  G.form[key] = value;
  if(!G.form._editingId) return;
  const idx = G.trees.findIndex(x => x.id === G.form._editingId);
  if(idx >= 0) {
    G.trees[idx][key] = value;
    try { localStorage.setItem('arbovta-trees', JSON.stringify(G.trees)); } catch(e) {}
    if(window._fb) window._fb.saveTree(G.trees[idx]);
  }
}
function restoreVTAui(){
  const vta = G.form.vta || {};
  const form = G.form;

  /* ── 1. CHIP ── */
  Object.keys(vta).filter(k=>k.startsWith('chip_')).forEach(k=>{
    const g = k.slice(5);
    const sel = Array.isArray(vta[k]) ? vta[k] : [];
    document.querySelectorAll(`.chip[data-g="${g}"]`).forEach(b=>{
      b.classList.toggle('on', sel.includes(b.textContent));
    });
  });

  /* ── 2. GRAVITÀ — applica stile inline diretto ── */
  Object.keys(vta).filter(k=>k.startsWith('sev_')).forEach(k=>{
    const sec = k.slice(4);
    const lv  = vta[k];
    if(!lv) return;
    /* Trova la card con .sec che corrisponde (case-insensitive, trim) */
    const card = [...document.querySelectorAll('.card')].find(c=>{
      const t = c.querySelector('.sec')?.textContent?.trim() || '';
      return t.toLowerCase() === sec.toLowerCase();
    });
    if(!card) return;
    const lvMap = {lieve:'sev-l', moderato:'sev-m', elevato:'sev-e'};
    const cls = lvMap[lv.toLowerCase()];
    if(!cls) return;
    const btn = card.querySelector(`.sev-b.${cls}`);
    if(btn) setSev(btn, lv.toLowerCase());
  });

    /* ── 3. PERICOLOSITÀ SEZIONI — bottoni .per con valore numerico ── */
  const perMap = [
    { numKey: 'per_rc_num', secs: ['radici','colletto'] },
    { numKey: 'per_fc_num', secs: ['fusto','castello'] },
    { numKey: 'per_bc_num', secs: ['branche','chioma'] },
  ];
  perMap.forEach(({numKey, secs}) => {
    const savedNum = vta[numKey] ? parseInt(vta[numKey]) : null;
    if(!savedNum) return;
    document.querySelectorAll('.card').forEach(card => {
      const secName = (card.querySelector('.sec')?.textContent||'').trim().toLowerCase();
      if(!secs.some(s => secName.includes(s))) return;
      card.querySelectorAll('.per').forEach(b => {
        const v1 = parseInt(b.dataset.v1);
        const v2 = parseInt(b.dataset.v2);
        const match = savedNum >= v1 && savedNum <= v2;
        b.classList.toggle('on', match);
        b.style.fontWeight = match ? '700' : '';
        b.style.boxShadow  = match ? '0 0 0 2px currentColor' : '';
        if(match) {
          b.dataset.cur = savedNum;
          const n = b.querySelector('.per-num');
          if(n) n.textContent = savedNum;
        }
      });
    });
  });

  /* ── 4.* ── 4. GIUDIZI — bottoni .gj ── */
  Object.keys(vta).filter(k=>k.startsWith('gjd_')).forEach(k=>{
    const lbl = k.slice(4).toLowerCase().replace(/[-\s]/g,'');
    const val = (vta[k]||'').toUpperCase().trim();
    if(!val) return;
    document.querySelectorAll('.field').forEach(f=>{
      const ft = (f.querySelector('label')?.textContent||'').toLowerCase().replace(/[-\s]/g,'');
      if(ft !== lbl) return;
      f.querySelectorAll('.gj').forEach(b=>{
        const on = b.textContent.toUpperCase().trim() === val;
        b.classList.toggle('on', on);
        b.style.fontWeight = on ? '700' : '';
        b.style.boxShadow  = on ? '0 0 0 2px currentColor' : '';
      });
    });
  });

  /* ── 5. TEXTAREA ── */
  const taMap = {
    giudFisio:   v => v.placeholder?.toLowerCase().includes('vegetativ') || v.placeholder?.toLowerCase().includes('fitosanit'),
    giudBiomec:  v => v.placeholder?.toLowerCase().includes('stabilit') || v.placeholder?.toLowerCase().includes('biomec'),
    prescrizioni:v => v.placeholder?.toLowerCase().includes('intervent') || v.placeholder?.toLowerCase().includes('prescriz'),
  };
  Object.keys(taMap).forEach(key=>{
    const val = form[key] || vta[key] || '';
    if(!val) return;
    document.querySelectorAll('textarea').forEach(ta=>{
      if(taMap[key](ta)) ta.value = val;
    });
  });

  /* ── 6. SELECT ── */
  const selectFields = [
    'sito','disposizione','stazione','suolo','pavimentazione',
    'sitoCon','posizSoc','conflitti',
    'giudVeg','giudFisio','giudBiomec','fattoreDanno'
  ];
  selectFields.forEach(key=>{
    const val = (form[key] || vta[key] || '').toLowerCase().trim();
    if(!val) return;
    const el = document.querySelector(`[onchange*="${key}"]`);
    if(!el) return;
    const opt = [...el.options].find(o=>
      o.value.toLowerCase().trim() === val ||
      o.text.toLowerCase().trim()  === val
    );
    if(opt) el.value = opt.value;
  });

  /* ── 7. INPUT text (ubicazione, data, codice, specie) ── */
  const inputMap = {
    'ubicazione': 'autosaveField(\'ubicazione\'',
    'data':       'autosaveField(\'data\'',
  };
  Object.keys(inputMap).forEach(key=>{
    const val = form[key] || '';
    if(!val) return;
    const el = document.querySelector(`[oninput*="${key}"]`);
    if(el && el.value !== val) el.value = val;
  });

  /* ── 8. CPC select ── */
  const cpcSel = document.getElementById('cpc-select');
  if(cpcSel && G.form.cpc) {
    cpcSel.value = G.form.cpc;
    const cv = document.getElementById('cpc-v');
    if(cv){ cv.textContent = G.form.cpc; cv.className = 'risk-val r' + (G.form.cpc||'A').replace('/',''); }
  }

  /* ── 9. RESTORE BOTTONI FC ── */
  const fcVal = (form.fattoreContatto||'').toUpperCase().trim();
  const fcNum = form.fattoreContattoNum ? parseInt(form.fattoreContattoNum) : null;
  document.querySelectorAll('[onclick="setFC(this)"]').forEach(b=>{
    const t  = b.textContent.split(' ')[0].toUpperCase().trim();
    const v1 = parseInt(b.dataset.v1);
    const v2 = parseInt(b.dataset.v2);
    /* Match per testo O per valore numerico */
    const matchTxt = fcVal && (t===fcVal || (fcVal.startsWith('TRASCUR')&&t.startsWith('TRASCUR')));
    const matchNum = fcNum && fcNum >= v1 && fcNum <= v2;
    const m = matchTxt || matchNum;
    b.classList.toggle('on', m);
    b.style.fontWeight = m ? '700' : '';
    b.style.boxShadow  = m ? '0 0 0 2px currentColor' : '';
    if(m && fcNum){
      b.dataset.cur = fcNum;
      const n = b.querySelector('.per-num');
      if(n) n.textContent = fcNum;
    }
  });

  /* ── 10. AGGIORNA INDICE DI RISCHIO ── */

  /* ── 10b. SPEDITIVA — ripristina pericolosità e giudizi ── */
  if(G.form.schedaMode === 'speditiva'){
    const pNum = G.form.pericolosita_num ? parseInt(G.form.pericolosita_num) : null;
    if(pNum){
      document.querySelectorAll('.peric-wrap[data-field="pericolosita"] .per').forEach(b=>{
        const v1=parseInt(b.dataset.v1), v2=parseInt(b.dataset.v2);
        const match = pNum>=v1 && pNum<=v2;
        b.classList.toggle('on', match);
        b.style.fontWeight = match?'700':'';
        b.style.boxShadow  = match?'0 0 0 2px currentColor':'';
        if(match){ b.dataset.cur=pNum; const n=b.querySelector('.per-num'); if(n) n.textContent=pNum; }
      });
    }
    /* Ripristina giudizi speditiva */
    ['giudFisio','giudVeg'].forEach(key=>{
      const val = (G.form[key]||'').toUpperCase().trim();
      if(!val) return;
      document.querySelectorAll('.gjd-wrap .gj').forEach(b=>{
        const lbl = b.closest('.field')?.querySelector('label')?.textContent?.toLowerCase()||'';
        const isRight = (key==='giudFisio' && lbl.includes('fisio')) ||
                        (key==='giudVeg'   && lbl.includes('veget'));
        if(isRight && b.textContent.toUpperCase()===val){
          b.closest('.gjd').querySelectorAll('.gj').forEach(x=>x.classList.remove('on'));
          b.classList.add('on');
        }
      });
    });
    /* Ripristina FC numerico nella speditiva */
    const fcN = G.form.fattoreContattoNum ? parseInt(G.form.fattoreContattoNum) : null;
    if(fcN) setFCNum(fcN);
  }

  setTimeout(updateRisk, 100);
}

function updateRisk(){
  const vta = G.form.vta || {};
  const isSpeditiva = G.form.schedaMode === 'speditiva';
  let J27, J37, J47;
  if(isSpeditiva){
    /* Nella speditiva usa pericolosita_num come valore unico × 3 */
    const pNum = G.form.pericolosita_num || 0;
    J27 = pNum; J37 = 0; J47 = 0;
  } else {
    J27 = vta['per_rc_num'] || 0;
    J37 = vta['per_fc_num'] || 0;
    J47 = vta['per_bc_num'] || 0;
  }
  const FC = G.form.fattoreContattoNum || 1;
  let FD = G.form.fattoreDimensionale || 0;
  if (!FD) {
    const h=parseFloat(G.form.h)||0, dbh=parseFloat(G.form.dbh)||0;
    const circ=(dbh/100)*Math.PI, dc=parseFloat(G.form.cw)||0;
    if(h>0||circ>0||dc>0){
      FD=(10/(1+Math.exp(-0.4*(h-12)))+10/(1+Math.exp(-0.04*(circ-100)))+10/(1+Math.exp(-0.7*(dc-6))))/3;
    } else { FD=1; }
  }
  const IR=(J27+J37+J47)*FC*FD;
  let pericLabel,cpc;
  if(IR<=30){pericLabel='Trascurabile';cpc='A';}
  else if(IR<=120){pericLabel='Basso';cpc='B';}
  else if(IR<=300){pericLabel='Moderato';cpc='C';}
  else if(IR<=600){pericLabel='Elevato';cpc='C/D';}
  else{pericLabel='Estremo';cpc='D';}

  const rv=document.getElementById('risk-v')||document.getElementById('ir-v-sp');
  const cv=document.getElementById('cpc-v');
  const pv=document.getElementById('peric-v');
  const dv=document.getElementById('fd-v');
  const fdNumV=document.getElementById('fd-num-v');
  const fdLabelV=document.getElementById('fd-label-v');
  if(rv) rv.textContent=IR>0?Math.round(IR):'—';
  if(pv) pv.textContent=IR>0?pericLabel:'—';
  /* Aggiorna display pericolosità finale */
  const perdisplay=document.getElementById('peric-label-display');
  if(perdisplay){ perdisplay.textContent=IR>0?pericLabel:'—'; }
  autosaveField('pericolosita', IR>0?pericLabel:'');
  const noMeas=!G.form.fattoreDimensionale&&!(parseFloat(G.form.h)||parseFloat(G.form.dbh));
  if(dv){
    dv.textContent=FD.toFixed(3);
    dv.title=noMeas?'Inserisci H e DBH per calcolo preciso':'';
    dv.style.color=noMeas?'var(--text-muted)':'';
  }
  /* Fattore di danno — valore numerico e label dalla sigmoide */
  let fdLabel='—';
  const fdRounded = Math.round(FD);
  if(!noMeas){
    if(FD<=2.5)      fdLabel='Trascurabile';
    else if(FD<=4.5) fdLabel='Basso';
    else if(FD<=6.5) fdLabel='Moderato';
    else if(FD<=8.5) fdLabel='Elevato';
    else             fdLabel='Estremo';
  }
  if(fdNumV){ fdNumV.textContent=noMeas?'—':fdRounded; fdNumV.style.color=noMeas?'var(--text-muted)':'var(--text-primary)'; }
  if(fdLabelV){ fdLabelV.textContent=noMeas?'Inserisci misure nel tab Misure':fdLabel; fdLabelV.style.color=noMeas?'var(--text-muted)':'var(--text-primary)'; }
  autosaveField('fattoreDanno', fdLabel);

  /* Aggiorna sempre CPC in base all'IR calcolato */
  G.form.cpc=cpc;
  if(cv){cv.textContent=cpc;cv.className='risk-val r'+cpc.replace('/','');}
  const sel=document.getElementById('cpc-select');
  if(sel) sel.value=cpc;
  autosaveField('cpc',cpc);
  autosaveField('indiceRischio',Math.round(IR));
